<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>조선 대쉬 인피니트 | Chosun Dash Infinite</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a0c14;
      font-family:'Outfit',system-ui,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
    #c{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
    #hud{position:fixed;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;color:#fff;font-weight:700;z-index:10;pointer-events:none;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
    #score-box{text-align:left}
    #high-box{text-align:right}
    #msg-overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;z-index:15;pointer-events:none;width:100%}
    .banner-title{font-size:48px;font-weight:900;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px;opacity:0;transform:scale(0.8);transition:all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
    .banner-title.show{opacity:1;transform:scale(1)}
    .banner-sub{font-size:20px;color:rgba(255,255,255,0.7);opacity:0;transition:opacity 0.5s 0.2s}
    .banner-sub.show{opacity:1}
    #death-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,12,20,0.85);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;color:#fff}
    .btn{padding:15px 40px;background:#f0a500;color:#000;border:none;border-radius:30px;font-weight:900;font-size:18px;cursor:pointer;margin-top:20px;transition:transform 0.2s}
    .btn:active{transform:scale(0.95)}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="score-box">DISTANCE: <span id="dist-val">0</span>m</div>
  <div id="high-box">BEST: <span id="best-val">0</span>m</div>
</div>
<div id="msg-overlay">
  <div id="banner-t" class="banner-title"></div>
  <div id="banner-s" class="banner-sub"></div>
</div>
<div id="death-screen">
  <h1 style="color:#ff3366;font-size:48px;margin-bottom:10px">실패!</h1>
  <p style="font-size:24px;margin-bottom:5px">기록: <span id="final-dist">0</span>m</p>
  <p id="death-msg" style="color:rgba(255,255,255,0.6);margin-bottom:20px"></p>
  <button class="btn" onclick="resetGame()">다시 도전</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const distVal = document.getElementById('dist-val');
const bestVal = document.getElementById('best-val');
const finalDist = document.getElementById('final-dist');
const deathScreen = document.getElementById('death-screen');
const deathMsg = document.getElementById('death-msg');
const bannerT = document.getElementById('banner-t');
const bannerS = document.getElementById('banner-s');

// ── THEMES ───────────────────────────────────────────────
const THEMES = [
  {name:'HAUNTED TEMPLE', kor:'사찰', sky:'#0e1130', bg:'#0a0c14', accent:'#4466dd', monster:'gwisin'},
  {name:'BAMBOO FOREST', kor:'대나무숲', sky:'#0a1a12', bg:'#08100d', accent:'#00bb55', monster:'gaeguri'},
  {name:'GUMIHO REALM', kor:'구미호의 영역', sky:'#1a0a18', bg:'#14080f', accent:'#ff66aa', monster:'gumiho'},
  {name:'DOKKAEBI MARKET', kor:'도깨비 저잣거리', sky:'#1a1208', bg:'#140f08', accent:'#f0a500', monster:'dokkaebi'},
  {name:'FIRE PEAK', kor:'화산봉', sky:'#1e0f08', bg:'#140908', accent:'#ff5522', monster:'bulgasari'},
  {name:'FROZEN PALACE', kor:'얼음궁', sky:'#0a1422', bg:'#080e14', accent:'#44ccff', monster:'yaksha'},
  {name:'DEMON GATE', kor:'귀문', sky:'#1e080c', bg:'#14080a', accent:'#ff2244', monster:'gangshi'},
  {name:'CLOUD SUMMIT', kor:'운정', sky:'#0e1228', bg:'#0c0e14', accent:'#8899ff', monster:'imugi'},
];

// ── SPRITES ──────────────────────────────────────────────
const sprites = {};
const monsterKeys = ['bulgasari', 'gaeguri', 'dokkaebi', 'gumiho', 'gwisin', 'yaksha', 'gangshi', 'imugi'];
monsterKeys.forEach(k => {
  const img = new Image();
  img.src = `assets/sprites/yokai_${k}.png`;
  sprites[k] = img;
});

// ── PHYSICS & STATE ──────────────────────────────────────
let W, H, baselineGY, CY;
let GY; // Current ground level under player
const PS = 42;
const SW = 40, SH = 40;
let gameSpd = 7;
let dist = 0, bestDist = parseInt(localStorage.getItem('chosun_dash_best') || '0');
let curThemeIdx = 0;
let phase = 'playing'; // playing|dead
let inputHeld = false;
let obstacles = [];
let nextSpawnX = 0;
let particles = [], stars = [], bgLayers = [];
let screenShake = 0;
let themeChangeCounter = 0;
let trail = [];

const pl = { x: 0, y: 0, vy: 0, rot: 0, grounded: false, mode: 'cube', dead: false };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  baselineGY = H * 0.80; CY = H * 0.08;
  GY = baselineGY;
  pl.x = W * 0.2;
  initBgLayers();
}
window.addEventListener('resize', resize);
resize();

function initBgLayers() {
  bgLayers = [
    { type: 'mts', pts: [], spd: 0.2, col: 'rgba(255,255,255,0.03)' },
    { type: 'mts', pts: [], spd: 0.5, col: 'rgba(255,255,255,0.06)' }
  ];
  bgLayers.forEach(l => {
    let x = -100;
    while(x < W + 600) {
      const mw = 300 + Math.random()*400, mh = 100 + Math.random()*250;
      l.pts.push({ x, w: mw, h: mh });
      x += mw * 0.6;
    }
  });
}

bestVal.textContent = bestDist;

// ── UTILS ────────────────────────────────────────────────
function spawnPfx(x, y, col, n = 12) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.5, sp = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3, life: 1, decay: 0.03 + Math.random() * 0.04, size: 3 + Math.random() * 5, col });
  }
}

function showBanner(title, sub) {
  bannerT.textContent = title;
  bannerS.textContent = sub;
  bannerT.classList.remove('show');
  void bannerT.offsetWidth; // Trigger reflow
  bannerT.classList.add('show');
  bannerS.classList.add('show');
  setTimeout(() => {
    bannerT.classList.remove('show');
    bannerS.classList.remove('show');
  }, 3000);
}

// ── OBSTACLES ────────────────────────────────────────────
const mk = {
  spike: (x, yOff=0) => ({ type: 'spike', x, y: (GY||baselineGY) - SH - yOff, w: SW, h: SH }),
  block: (x, yOff, w, h) => ({ type: 'block', x, y: baselineGY - (yOff||0) - (h||PS), w: w||(PS*1.1), h: h||PS }),
  orb: (x, yOff=0) => ({ type: 'orb', x, y: (GY||baselineGY) - PS * 0.5 - yOff, r: 14 }),
  portal: (x, m) => ({ type: 'portal', x, y: CY, toMode: m, w: 40, h: baselineGY - CY }),
  monster: (x, type, yOff=0) => ({ type: 'monster', x, y: (GY||baselineGY) - SH * 1.2 - yOff, w: SH * 1.2, h: SH * 1.2, mType: type }),
  creek: (x, w) => ({ type: 'creek', x, y: baselineGY, w: w||150, h: H - baselineGY })
};

function getRandomPattern() {
  const difficulty = Math.min(1, dist / 20000);
  const theme = THEMES[curThemeIdx];
  const spawnX = W + 100;
  
  const roll = Math.random();
  
  // Even more thrilling patterns
  if (roll < 0.15) { // Vertical challenge
    return [
      mk.block(spawnX, 0, PS*3, PS),
      mk.block(spawnX + PS*1.2, PS, PS*2, PS),
      mk.block(spawnX + PS*2.4, PS*2, PS*2, PS),
      mk.orb(spawnX + PS*3, PS*3),
      mk.monster(spawnX + PS*4.5, theme.monster, PS*3.5)
    ];
  }
  if (roll < 0.3) { // High-speed creek
    return [
      mk.creek(spawnX, 300),
      mk.block(spawnX + 100, 0, 100, 15),
      mk.spike(spawnX + 350)
    ];
  }
  if (roll < 0.45) return [mk.spike(spawnX), mk.spike(spawnX + 45), mk.spike(spawnX + 90), mk.monster(spawnX+180, theme.monster)];
  if (roll < 0.6) return [mk.monster(spawnX, theme.monster), mk.orb(spawnX + 120), mk.monster(spawnX+240, theme.monster)];
  if (roll < 0.75 && pl.mode === 'cube') return [mk.portal(spawnX, 'ship')];
  if (roll < 0.75 && pl.mode === 'ship') return [mk.portal(spawnX, 'cube')];
  
  return [mk.spike(spawnX), mk.block(spawnX + 100, 0, PS, PS*2.5), mk.spike(spawnX + 100, PS*2.5)];
}

// ── GAME LOGIC ───────────────────────────────────────────
function initGame() {
  dist = 0;
  gameSpd = 7;
  curThemeIdx = 0;
  obstacles = [];
  particles = [];
  trail = [];
  themeChangeCounter = 0;
  nextSpawnX = 0;
  pl.y = baselineGY - PS;
  pl.vy = 0;
  pl.mode = 'cube';
  pl.dead = false;
  GY = baselineGY;
  phase = 'playing';
  deathScreen.style.display = 'none';
  showBanner(THEMES[0].name, THEMES[0].kor);
  initStars();
}

function resetGame() { initGame(); }

function initStars() {
  stars = Array.from({ length: 140 }, () => ({
    x: Math.random() * W, y: Math.random() * baselineGY,
    r: Math.random() * 1.5 + 0.5, sp: Math.random() * 0.6 + 0.1,
    a: Math.random() * 0.6 + 0.2
  }));
}

function update() {
  if (phase !== 'playing') return;

  // Faster Progression
  dist += gameSpd * 0.18;
  distVal.textContent = Math.floor(dist);
  gameSpd = 7 + (dist / 400); // Progressively much faster
  
  // Theme change
  themeChangeCounter += gameSpd * 0.1;
  if (themeChangeCounter > 1000) {
    themeChangeCounter = 0;
    curThemeIdx = (curThemeIdx + 1) % THEMES.length;
    showBanner(THEMES[curThemeIdx].name, THEMES[curThemeIdx].kor);
  }

  // Parallax
  bgLayers.forEach(l => {
    l.pts.forEach(p => {
      p.x -= gameSpd * l.spd;
      if (p.x + p.w < -100) p.x = W + Math.random()*200;
    });
  });

  // Find ground under player
  let currentGround = baselineGY;
  let onCreek = false;
  
  obstacles.forEach(o => {
    if (o.type === 'creek') {
      if (pl.x + PS*0.7 > o.x && pl.x + PS*0.3 < o.x + o.w) {
        onCreek = true;
      }
    }
    if (o.type === 'block') {
      if (pl.x + PS*0.8 > o.x && pl.x + PS*0.2 < o.x + o.w) {
        if (pl.y + PS <= o.y + 15) { 
            if (o.y < currentGround) currentGround = o.y;
        }
      }
    }
  });
  
  if (onCreek && currentGround === baselineGY) {
    currentGround = H + 500; 
  }
  
  GY = currentGround;

  // Player Physics
  if (pl.mode === 'cube') {
    pl.vy += 0.7; 
    pl.y += pl.vy;
    
    if (pl.y >= GY - PS) {
      if (GY > H) { kill(); } 
      else {
        pl.y = GY - PS;
        pl.vy = 0;
        pl.grounded = true;
      }
    } else {
      pl.grounded = false;
    }
    
    if (pl.y < CY) { pl.y = CY; pl.vy = 0; }
    pl.rot = pl.grounded ? Math.round(pl.rot / (Math.PI / 2)) * (Math.PI / 2) : pl.rot + 0.15;
  } else {
    if (inputHeld) pl.vy -= 0.75;
    else pl.vy += 0.55;
    pl.vy *= 0.95;
    pl.y += pl.vy;
    if (pl.y >= baselineGY - PS || pl.y <= CY) kill();
    pl.rot = pl.vy * 0.07;
  }

  // Trail
  if (phase === 'playing') {
    trail.push({x: pl.x + PS/2, y: pl.y + PS/2});
    if (trail.length > 15) trail.shift();
  }

  // Spawn logic
  if (dist > nextSpawnX) {
    const pat = getRandomPattern();
    obstacles.push(...pat);
    const gap = Math.max(120, 200 + Math.random() * 230 - (gameSpd * 5) - (dist/350));
    nextSpawnX = dist + gap;
  }
  
  // Obstacle Management
  obstacles.forEach(o => {
    o.x -= gameSpd;
    
    const m = 6;
    if (o.type === 'portal') {
      if (pl.x + PS > o.x && pl.x < o.x + o.w && pl.y + PS > o.y && pl.y < o.y + o.h) {
        if (pl.mode !== o.toMode) {
            pl.mode = o.toMode;
            spawnPfx(pl.x + PS / 2, pl.y + PS / 2, THEMES[curThemeIdx].accent, 25);
            o.x = -800;
        }
      }
    } else if (o.type === 'orb') {
       if (Math.hypot(pl.x + PS / 2 - (o.x + o.r), pl.y + PS / 2 - o.y) < o.r + PS / 2) {
         pl.vy = -16; pl.grounded = false;
         spawnPfx(o.x + o.r, o.y, '#44ff88', 12);
         o.x = -800;
       }
    } else if (o.type === 'spike' || o.type === 'monster') {
      let ox = o.x + m, oy = o.y + m, ow = o.w - m * 2, oh = o.h - m * 2;
      if (pl.x + m < ox + ow && pl.x + PS - m > ox && pl.y + m < oy + oh && pl.y + PS - m > oy) {
        kill(o.mType || 'spike');
      }
    } else if (o.type === 'block') {
       if (pl.x + PS > o.x + 4 && pl.x < o.x + o.w - 4) {
         if (pl.y + PS > o.y + 12 && pl.y < o.y + o.h - 8) {
             kill('block');
         }
       }
    }
  });
  obstacles = obstacles.filter(o => o.x > -1000);

  // Particles & Stars
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life -= p.decay; });
  particles = particles.filter(p => p.life > 0);
  stars.forEach(s => { s.x -= s.sp * gameSpd * 0.12; if (s.x < 0) s.x = W; });
}

function draw() {
  const theme = THEMES[curThemeIdx];
  
  // Shake
  let sx = 0, sy = 0;
  if (screenShake > 0) {
    sx = (Math.random() - 0.5) * screenShake;
    sy = (Math.random() - 0.5) * screenShake;
    screenShake *= 0.88;
  }
  ctx.setTransform(1, 0, 0, 1, sx, sy);

  // BG Gradient
  const grad = ctx.createLinearGradient(0, 0, 0, baselineGY);
  grad.addColorStop(0, theme.sky); grad.addColorStop(1, theme.bg);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Parallax
  bgLayers.forEach(l => {
    ctx.fillStyle = l.col;
    l.pts.forEach(p => {
      ctx.beginPath();
      ctx.moveTo(p.x, baselineGY);
      ctx.lineTo(p.x + p.w/2, baselineGY - p.h);
      ctx.lineTo(p.x + p.w, baselineGY);
      ctx.fill();
    });
  });

  // Stars
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    ctx.globalAlpha = s.a;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Ground / Creek
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, baselineGY, W, H - baselineGY);
  
  // Draw Creeks (Voids)
  obstacles.filter(o => o.type === 'creek').forEach(o => {
      ctx.fillStyle = theme.bg;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = 'rgba(68, 102, 221, 0.4)';
      ctx.fillRect(o.x, o.y + 5, o.w, 35);
  });

  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, baselineGY); ctx.lineTo(W, baselineGY); ctx.stroke();
  
  // Trail
  if (trail.length > 2 && !pl.dead) {
    ctx.beginPath();
    ctx.strokeStyle = pl.mode === 'cube' ? '#f0a500' : '#00ffcc';
    ctx.lineWidth = PS * 0.4;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.3;
    ctx.moveTo(trail[0].x, trail[0].y);
    trail.forEach(t => ctx.lineTo(t.x, t.y));
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Obstacles
  obstacles.forEach(o => {
    if (o.type === 'spike') {
      ctx.fillStyle = '#ff3366';
      ctx.shadowBlur = 12; ctx.shadowColor = '#ff3366';
      ctx.beginPath(); ctx.moveTo(o.x, o.y + o.h); ctx.lineTo(o.x + o.w / 2, o.y); ctx.lineTo(o.x + o.w, o.y + o.h); ctx.fill();
      ctx.shadowBlur = 0;
    } else if (o.type === 'block') {
      ctx.fillStyle = '#1a2030';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = theme.accent;
      ctx.lineWidth = 2;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(o.x, o.y, o.w, 5);
    } else if (o.type === 'orb') {
      ctx.fillStyle = '#44ff88';
      ctx.shadowBlur = 15; ctx.shadowColor = '#44ff88';
      ctx.beginPath(); ctx.arc(o.x + o.r, o.y, o.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(o.x + o.r, o.y, o.r*0.4, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    } else if (o.type === 'portal') {
      const pCol = o.toMode === 'ship' ? '#00ffcc' : '#aa44ff';
      ctx.strokeStyle = pCol; ctx.lineWidth = 4;
      ctx.shadowBlur = 20; ctx.shadowColor = pCol;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = pCol; ctx.globalAlpha = 0.2;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    } else if (o.type === 'monster') {
      const img = sprites[o.mType];
      if (img && img.complete) {
        ctx.drawImage(img, o.x, o.y, o.w, o.h);
      } else {
        ctx.fillStyle = theme.accent;
        ctx.fillRect(o.x, o.y, o.w, o.h);
      }
    }
  });

  // Player
  if (!pl.dead) {
    ctx.save();
    ctx.translate(pl.x + PS / 2, pl.y + PS / 2);
    ctx.rotate(pl.rot);
    if (pl.mode === 'cube') {
      ctx.fillStyle = '#f0a500';
      ctx.shadowBlur = 15; ctx.shadowColor = '#f0a500';
      ctx.fillRect(-PS / 2, -PS / 2, PS, PS);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(-PS / 2, -PS / 2, PS, PS);
      ctx.fillStyle = '#000';
      ctx.fillRect(PS*0.12, -PS*0.25, PS*0.12, PS*0.12);
      ctx.fillRect(-PS*0.24, -PS*0.25, PS*0.12, PS*0.12);
    } else {
      ctx.fillStyle = '#00ffcc';
      ctx.shadowBlur = 20; ctx.shadowColor = '#00ffcc';
      ctx.beginPath(); ctx.moveTo(PS / 2, 0); ctx.lineTo(-PS / 2, -PS / 2); ctx.lineTo(-PS * 0.2, 0); ctx.lineTo(-PS / 2, PS / 2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  requestAnimationFrame(draw);
}

// ── AUDIO ────────────────────────────────────────────────
let ac = null;
function initAudio() { if(!ac) ac = new(window.AudioContext||window.webkitAudioContext)(); }
function beep(f, t, d, v=0.1) {
  if(!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = t; o.frequency.value = f;
  g.gain.setValueAtTime(v, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+d);
  o.start(); o.stop(ac.currentTime+d);
}

function kill(mType) {
  if (pl.dead) return;
  pl.dead = true;
  phase = 'dead';
  screenShake = 20;
  spawnPfx(pl.x + PS / 2, pl.y + PS / 2, '#ff3366', 35);
  beep(150, 'sawtooth', 0.3, 0.2);
  
  if (dist > bestDist) {
    bestDist = Math.floor(dist);
    localStorage.setItem('chosun_dash_best', bestDist);
    bestVal.textContent = bestDist;
  }
  
  finalDist.textContent = Math.floor(dist);
  const deathLabels = { spike: '가시에 찔렸습니다!', block: '블록에 부딪혔습니다!', orb: '구슬에 당했습니다!',
    gwisin: '귀신에게 당했습니다!', gaeguri: '개구리 요괴에게 당했습니다!', gumiho: '구미호에게 당했습니다!',
    dokkaebi: '도깨비에게 당했습니다!', bulgasari: '불가사리에게 당했습니다!', yaksha: '야차에게 당했습니다!',
    gangshi: '강시에게 당했습니다!', imugi: '이무기에게 당했습니다!' };
  deathMsg.textContent = mType ? (deathLabels[mType] || `${mType}에게 당했습니다!`) : '장애물에 부딪혔습니다.';
  setTimeout(() => {
    deathScreen.style.display = 'flex';
  }, 1000);
}

// ── INPUT ────────────────────────────────────────────────
function jump() {
  initAudio();
  if (phase === 'playing' && pl.mode === 'cube' && pl.grounded) {
    pl.vy = -13.5;
    pl.grounded = false;
    beep(400, 'square', 0.08);
  }
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    inputHeld = true;
    jump();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') inputHeld = false;
});
canvas.addEventListener('mousedown', () => { inputHeld = true; jump(); });
canvas.addEventListener('mouseup', () => { inputHeld = false; });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); inputHeld = true; jump(); });
canvas.addEventListener('touchend', () => { inputHeld = false; });

initGame();
draw();
setInterval(update, 1000 / 60);
</script>
</body>
</html>
