<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HIGHWAY CHASE - LEADERBOARD EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            overflow: hidden;
            touch-action: none;
        }

        /* Hide non-game elements as requested */
        .back-portal, .fullscreen-btn {
            display: none !important;
        }

        #gameContainer { 
            position: relative;
            width: 480px;
            height: 720px;
            flex-shrink: 0;
            background: #000;
        }

        /* Responsive full-screen on mobile */
        @media (max-width: 1024px) {
            body { align-items: flex-start; }
            #gameContainer {
                width: 100vw;
                height: 100dvh;
                transform: none !important;
            }
            canvas {
                width: 100%;
                height: 100%;
                object-fit: contain;
                background-color: #000;
            }
        }

        canvas {
            display: block;
            width: 480px;
            height: 720px;
            background-color: #1a1a24;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 480px;
            height: 720px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Mobile controls overlay */
        .mobile-ui {
            display: none;
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            width: 100%;
            height: 180px;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 50;
            pointer-events: none;
        }

        @media (max-width: 1024px) {
            .mobile-ui { display: flex; justify-content: space-between; align-items: flex-end; }
        }

        .touch-btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            pointer-events: auto;
            touch-action: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .touch-btn:active {
            background: rgba(0, 115, 255, 0.4);
            border-color: #0073ff;
            transform: scale(0.95);
        }

        .nitro-btn {
            width: 110px;
            height: 70px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            color: #ff1744;
            border-color: #ff1744;
        }
        .nitro-btn:active {
            background: rgba(255, 23, 68, 0.3);
            border-color: #ff1744;
        }

        #mainScreen {
            background: radial-gradient(circle at 50% 30%, rgba(0, 115, 255, 0.15), transparent 60%),
                        radial-gradient(circle at 50% 80%, rgba(255, 23, 68, 0.1), transparent 50%),
                        rgba(10, 10, 15, 0.85);
            animation: modernBreathe 6s ease-in-out infinite alternate;
        }
        @keyframes modernBreathe { 0% { filter: brightness(0.9); } 100% { filter: brightness(1.2); } }

        .main-logo {
            font-size: 64px; font-weight: 900; line-height: 0.95; 
            text-align: center; margin-bottom: 20px; font-style: italic; letter-spacing: -1px;
            background: linear-gradient(180deg, #ffffff 0%, #b0bec5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.6)); transform: skewX(-4deg);
        }
        @media (max-width: 480px) {
            .main-logo { font-size: 48px; }
        }
        .main-logo span { 
            background: linear-gradient(180deg, #ff5252 0%, #d50000 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .sub-text {
            color: #90a4ae; font-size: 14px; margin-bottom: 50px; font-weight: 700;
            letter-spacing: 4px; animation: fadeInOut 2s infinite alternate;
        }
        @keyframes fadeInOut { from { opacity: 0.4; } to { opacity: 1; } }

        /* 버튼 스타일 공통 */
        .btn-primary, .btn-secondary {
            padding: 15px 40px; font-size: 20px; font-weight: 900; 
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif; letter-spacing: 1px; width: 280px; 
            max-width: 90vw; margin-bottom: 15px;
        }
        .btn-primary {
            background: #ffffff; color: #000000; border: none; box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }
        .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(255,255,255,0.4); background: #e0e0e0; }
        
        .btn-secondary {
            background: rgba(0, 229, 255, 0.1); color: #00e5ff; border: 2px solid #00e5ff;
            box-shadow: 0 5px 15px rgba(0,229,255,0.2);
        }
        .btn-secondary:hover { background: #00e5ff; color: #000; box-shadow: 0 10px 30px rgba(0,229,255,0.5); transform: translateY(-2px); }

        /* 차량 선택 화면 */
        .select-title { font-size: 28px; font-weight: 900; margin-bottom: 30px; letter-spacing: -0.5px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .carousel-container { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 20px; box-sizing: border-box; margin-bottom: 40px; }
        .nav-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #00e5ff; font-size: 30px; width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .nav-btn:hover { background: rgba(0, 229, 255, 0.2); border-color: #00e5ff; color: #fff; transform: scale(1.1); box-shadow: 0 0 20px rgba(0,229,255,0.4); }

        .showcase { display: flex; flex-direction: column; align-items: center; width: 280px; }
        #previewCanvas {
            width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 60%); margin-bottom: 20px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .car-details { text-align: center; width: 100%; }
        .car-name { font-size: 32px; font-weight: 900; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .car-trait { font-size: 15px; color: #b0bec5; font-weight: 700; margin-bottom: 20px; }

        .gauge-wrapper { display: flex; align-items: center; justify-content: center; width: 100%; font-size: 14px; font-weight: 700; color: #fff; }
        .gauge-track { width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-left: 12px; overflow: hidden; }
        .gauge-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease, background 0.4s ease; }

        /* 인게임 부스터 UI */
        #gameUI {
            position: absolute; bottom: 20px; left: 20px; right: 20px; display: none;
            justify-content: space-between; align-items: flex-end; z-index: 5; pointer-events: none;
        }
        .boost-container { width: 200px; }
        .boost-text { font-weight: 900; font-size: 16px; color: #00e5ff; margin-bottom: 5px; text-shadow: 0 2px 4px #000; }
        .boost-bar-bg { width: 100%; height: 14px; background: rgba(0,0,0,0.6); border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); overflow: hidden; }
        #boostBar { height: 100%; width: 0%; background: linear-gradient(90deg, #00e5ff, #ffeb3b); box-shadow: 0 0 10px #00e5ff; transition: width 0.1s; }
        .key-hint { font-size: 12px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px; font-weight: bold; }

        /* --- 게임 오버 및 리더보드 UI --- */
        #gameOverScreen { background: rgba(5,5,10,0.95); display: none; z-index: 15; }
        .busted-text { font-size: 60px; font-weight: 900; color: #ff1744; text-shadow: 0 0 20px rgba(255,23,68,0.6); margin-bottom: 5px; transform: rotate(-3deg); }
        .final-score-text { font-size: 26px; color: #fff; margin-bottom: 30px; font-weight: 700; }
        
        .name-input {
            background: rgba(255,255,255,0.05); border: 2px solid #00e5ff; color: #00e5ff;
            padding: 15px 20px; font-size: 24px; border-radius: 12px; outline: none;
            font-family: 'Montserrat', sans-serif; font-weight: 900; text-align: center; text-transform: uppercase;
            width: 250px; margin-bottom: 30px; transition: 0.3s; box-shadow: inset 0 0 10px rgba(0,229,255,0.1);
        }
        .name-input:focus { background: rgba(0,229,255,0.1); box-shadow: 0 0 20px rgba(0,229,255,0.4), inset 0 0 15px rgba(0,229,255,0.2); }
        .name-input::placeholder { color: rgba(0,229,255,0.3); font-weight: 400; }

        #leaderboardScreen { display: none; z-index: 20; justify-content: flex-start; padding-top: 50px; }
        .lb-title { font-size: 36px; font-weight: 900; color: #ffeb3b; text-shadow: 0 0 15px rgba(255,235,59,0.5); margin-bottom: 30px; }
        
        .lb-table { width: 80%; max-height: 400px; overflow-y: auto; margin-bottom: 30px; }
        .lb-row {
            display: flex; justify-content: space-between; padding: 12px 20px;
            background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 8px;
            font-size: 18px; font-weight: 700; border-left: 4px solid transparent; transition: 0.2s;
        }
        .lb-row:hover { background: rgba(255,255,255,0.1); border-left: 4px solid #00e5ff; }
        .lb-rank { color: #90a4ae; width: 40px; }
        .lb-name { color: #fff; flex: 1; text-align: left; padding-left: 10px; }
        .lb-score { color: #00e5ff; font-weight: 900; }
        
        /* 1등, 2등, 3등 금은동 컬러 */
        .lb-row:nth-child(1) { border-left-color: #ffd700; background: linear-gradient(90deg, rgba(255,215,0,0.1), transparent); }
        .lb-row:nth-child(1) .lb-rank, .lb-row:nth-child(1) .lb-score { color: #ffd700; }
        .lb-row:nth-child(2) { border-left-color: #c0c0c0; background: linear-gradient(90deg, rgba(192,192,192,0.1), transparent); }
        .lb-row:nth-child(2) .lb-rank, .lb-row:nth-child(2) .lb-score { color: #c0c0c0; }
        .lb-row:nth-child(3) { border-left-color: #cd7f32; background: linear-gradient(90deg, rgba(205,127,50,0.1), transparent); }
        .lb-row:nth-child(3) .lb-rank, .lb-row:nth-child(3) .lb-score { color: #cd7f32; }

        /* Back Button */
        .back-portal {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            color: #00e5ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid #00e5ff;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }
        .back-portal:hover {
            background: rgba(0, 229, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>
<body>
<body style="touch-action: none;">
    <a href="index.html" class="back-portal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        PLAYGROUND
    </a>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        
        <!-- Mobile UI -->
        <div class="mobile-ui">
            <div id="btnLeft" class="touch-btn">◀</div>
            <div id="btnNitro" class="touch-btn nitro-btn">Nitro</div>
            <div id="btnRight" class="touch-btn">▶</div>
        </div>

        <div id="gameUI">
            <div class="boost-container">
                <div class="boost-text">NITRO BOOST</div>
                <div class="boost-bar-bg"><div id="boostBar"></div></div>
            </div>
            <div class="key-hint">SPACEBAR</div>
        </div>

        <div id="mainScreen" class="ui-screen">
            <div class="main-logo">HIGHWAY<br><span>CHASE</span></div>
            <div class="sub-text">TAP TO START</div>
            <button class="btn-primary" onclick="goToCarSelect()">START GAME</button>
            <button class="btn-secondary" onclick="showLeaderboard()">LEADERBOARD</button>
        </div>

        <div id="carSelectScreen" class="ui-screen" style="display: none;">
            <div class="select-title">SELECT RIDE</div>
            <div class="carousel-container">
                <button class="nav-btn" onclick="prevCar()">◀</button>
                <div class="showcase">
                    <canvas id="previewCanvas" width="260" height="260"></canvas>
                    <div class="car-details">
                        <div id="previewName" class="car-name">Sedan</div>
                        <div id="previewTrait" class="car-trait">Stable Balance</div>
                        <div class="gauge-wrapper">
                            <span>HANDLING</span>
                            <div class="gauge-track"><div id="previewGauge" class="gauge-fill"></div></div>
                        </div>
                    </div>
                </div>
                <button class="nav-btn" onclick="nextCar()">▶</button>
            </div>
            <button class="btn-primary" onclick="startSelectedCar()" style="width: auto; padding: 15px 60px;">RIDE NOW</button>
            <button class="btn-secondary" onclick="goToMain()" style="width: auto; padding: 15px 40px; margin-top: -5px; font-size: 16px;">BACK</button>
        </div>

        <div id="gameOverScreen" class="ui-screen">
            <div class="busted-text">BUSTED!</div>
            <div id="finalScoreDisplay" class="final-score-text">SCORE: 0</div>
            
            <input type="text" id="playerNameInput" class="name-input" placeholder="ENTER INITIALS" maxlength="8" autocomplete="off">
            
            <button class="btn-primary" onclick="saveScore()">SAVE SCORE</button>
            <button class="btn-secondary" onclick="skipToMain()">SKIP TO MENU</button>
        </div>

        <div id="leaderboardScreen" class="ui-screen">
            <div class="lb-title">TOP RACERS</div>
            <div id="lbTable" class="lb-table">
                </div>
            <button class="btn-secondary" onclick="goToMain()">MAIN MENU</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // 스크린 객체들
        const mainScreen = document.getElementById("mainScreen");
        const carSelectScreen = document.getElementById("carSelectScreen");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const leaderboardScreen = document.getElementById("leaderboardScreen");
        const gameUI = document.getElementById("gameUI");
        const boostBar = document.getElementById("boostBar");

        let isPlaying = false, isGameOver = false;
        let score = 0, timeTick = 0, roadOffset = 0, baseSpeed = 5;
        let foodTruckTimer = 0, policeDist = 350;
        const MAX_DIST = 350;
        let level = 1, levelUpAlpha = 0, screenShake = 0;
        
        let boostGauge = 0; 
        let isBoosting = false;
        let weather = "clear"; 
        let weatherParticles = [];
        let floatingTexts = [];
        let distanceSinceLastSpawn = 0;

        let particles = [], decorations = [], obstacles = [], items = [];
        let currentSelectIndex = 0;

        // --- 사운드 시스템 ---
        let audioCtx, engineOsc, engineGain, sirenOsc, sirenGain;

        function initAudio() {
            if (audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator(); engineGain = audioCtx.createGain();
            engineOsc.type = 'sawtooth'; engineOsc.connect(engineGain); engineGain.connect(audioCtx.destination);
            engineGain.gain.value = 0; engineOsc.start();
            sirenOsc = audioCtx.createOscillator(); sirenGain = audioCtx.createGain();
            sirenOsc.type = 'square'; sirenOsc.connect(sirenGain); sirenGain.connect(audioCtx.destination);
            sirenGain.gain.value = 0; sirenOsc.start();
        }

        function playDingSound() { 
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playLevelUpSound() {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function playGameOverSound() {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
            osc.start(); osc.stop(audioCtx.currentTime + 1.2);
        }

        // --- 리더보드 데이터 관리 (localStorage) ---
        let highScores = JSON.parse(localStorage.getItem('highwayChaseScores')) || [];

        function saveScore() {
            let nameInput = document.getElementById("playerNameInput").value.trim().toUpperCase();
            if (nameInput === "") nameInput = "ANON";
            
            highScores.push({ name: nameInput, score: score });
            highScores.sort((a, b) => b.score - a.score); // 점수 내림차순 정렬
            highScores = highScores.slice(0, 10); // 최대 10위까지만 유지
            
            localStorage.setItem('highwayChaseScores', JSON.stringify(highScores));
            showLeaderboard();
        }

        function renderLeaderboardTable() {
            let table = document.getElementById("lbTable");
            table.innerHTML = "";
            if (highScores.length === 0) {
                table.innerHTML = "<div style='text-align:center; color:#90a4ae; padding: 20px;'>NO RECORDS YET</div>";
                return;
            }
            highScores.forEach((record, index) => {
                let row = document.createElement("div");
                row.className = "lb-row";
                row.innerHTML = `
                    <div class="lb-rank">${index + 1}</div>
                    <div class="lb-name">${record.name}</div>
                    <div class="lb-score">${record.score.toLocaleString()}</div>
                `;
                table.appendChild(row);
            });
        }

        function showLeaderboard() {
            hideAllScreens();
            renderLeaderboardTable();
            leaderboardScreen.style.display = "flex";
        }

        // --- 화면 전환 함수들 ---
        function hideAllScreens() {
            mainScreen.style.display = "none";
            carSelectScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            leaderboardScreen.style.display = "none";
            gameUI.style.display = "none";
        }

        window.goToMain = function() {
            hideAllScreens();
            mainScreen.style.display = "flex";
            // 캔버스 초기화
            ctx.fillStyle = "#1a1a24"; ctx.fillRect(0,0,canvas.width, canvas.height);
        };

        window.goToCarSelect = function() {
            initAudio(); if(audioCtx.state === 'suspended') audioCtx.resume();
            hideAllScreens();
            carSelectScreen.style.display = "flex";
            updateShowroom(); 
        };

        window.skipToMain = function() {
            isPlaying = false;
            goToMain();
        };

        // --- 차량 및 게임 로직 ---
        const carTypes = [
            { name: "Sedan", color: "#1e88e5", w: 46, h: 82, handle: 7, traitText: "Stable Balance" },
            { name: "Sports Car", color: "#e53935", w: 48, h: 86, handle: 11, traitText: "Extreme Cornering" },
            { name: "Compact", color: "#7cb342", w: 40, h: 66, handle: 8.5, traitText: "Gap Specialist" },
            { name: "Pickup", color: "#6d4c41", w: 52, h: 90, handle: 5.5, traitText: "1-Hit Shield" },
            { name: "Vintage", color: "#8e24aa", w: 46, h: 88, handle: 6.5, traitText: "Gauge Charge x1.5" },
            { name: "Food Truck", color: "#fb8c00", w: 56, h: 100, handle: 5.0, traitText: "Police Knockback" }
        ];

        let player = { x: 218, y: 500, vx: 0, w: 46, h: 82, speed: 6.5, type: 0, shield: false };
        const police = { x: 218, y: 750, vx: 0, w: 50, h: 86, color: "#111" };

        const biomes = [
            { name: "Neon City", road: "#2b2b36", deco1: "#ff007f", deco2: "#00f0ff" }, 
            { name: "Desert", road: "#6d4c41", deco1: "#8d6e63", deco2: "#d7ccc8" },
            { name: "Dark Forest", road: "#1b5e20", deco1: "#2e7d32", deco2: "#388e3c" }, 
            { name: "Coastal Road", road: "#37474f", deco1: "#546e7a", deco2: "#b0bec5" }
        ];

        let keys = { ArrowLeft: false, ArrowRight: false, Space: false };
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Mobile touch handling
        const touchMappings = [
            { id: 'btnLeft', key: 'ArrowLeft' },
            { id: 'btnRight', key: 'ArrowRight' },
            { id: 'btnNitro', key: 'Space' }
        ];

        touchMappings.forEach(map => {
            const el = document.getElementById(map.id);

        function update() {
            if (!isPlaying) return; // 메뉴 화면일 땐 업데이트 안 함
            if (isGameOver) { 
                if(engineGain && engineGain.gain.value > 0.001) engineGain.gain.value *= 0.9;
                if(sirenGain && sirenGain.gain.value > 0.001) sirenGain.gain.value *= 0.9;
                return;
            }

            score++; timeTick++;
            let currentLevel = Math.floor(score / 500) + 1;
            if (currentLevel > 100) currentLevel = 100; 
            if (currentLevel > level) { level = currentLevel; levelUpAlpha = 1.0; playLevelUpSound(); }
            if (levelUpAlpha > 0) levelUpAlpha -= 0.015; 
            
            if (timeTick % 2000 === 0) {
                let wRand = Math.random();
                if (wRand < 0.3) weather = "rain"; else if (wRand < 0.6) weather = "snow"; else weather = "clear";
            }
            
            let currentFriction = 0.82;
            if (weather === "rain") currentFriction = 0.90; 
            if (weather === "snow") currentFriction = 0.86;

            baseSpeed = 6 + (level * 0.25); 
            currentBiome = Math.floor(score / 2000) % 4;
            
            if (keys.Space && boostGauge > 0) {
                isBoosting = true; boostGauge -= 1.5; 
                if (boostGauge < 0) boostGauge = 0;
            } else { isBoosting = false; }
            
            boostBar.style.width = boostGauge + "%";

            let currentSpeed = isBoosting ? baseSpeed + 12 : baseSpeed;
            roadOffset += currentSpeed;
            if(screenShake > 0) screenShake--;
            
            if (engineOsc) { engineOsc.frequency.value = 40 + (currentSpeed * 3); engineGain.gain.value = isBoosting ? 0.15 : 0.06; }
            if (sirenOsc) { sirenOsc.frequency.value = 850 + Math.sin(Date.now() / 120) * 200; let sirenVol = Math.max(0, 1 - (policeDist - 60) / 250); sirenGain.gain.value = sirenVol * 0.2; }
            
            let acceleration = player.speed * 0.25; 
            if (keys.ArrowLeft) player.vx -= acceleration; if (keys.ArrowRight) player.vx += acceleration;
            player.vx *= currentFriction; player.x += player.vx;
            
            if (player.x < 40) { player.x = 40; player.vx *= -0.2; } 
            if (player.x + player.w > canvas.width - 40) { player.x = canvas.width - player.w - 40; player.vx *= -0.2; }
            
            let recoveryRate = 0.6 - (level * 0.005); 
            if (recoveryRate < 0.05) recoveryRate = 0.05; 
            if (policeDist < MAX_DIST) policeDist += recoveryRate;
            police.y = player.y + policeDist; police.vx = (player.x - police.x + (player.w - police.w)/2) * 0.08; police.x += police.vx;
            if (carTypes[player.type].traitText.includes("Police") && ++foodTruckTimer > 250) { policeDist += 50; foodTruckTimer = 0; }
            if (player.boost > 0) player.boost--;
            
            distanceSinceLastSpawn += currentSpeed;
            let spawnInterval = Math.max(200, 450 - (level * 3.5));
            if (distanceSinceLastSpawn > spawnInterval) { spawnObjects(); distanceSinceLastSpawn = 0; }
            
            for (let i = decorations.length - 1; i >= 0; i--) { decorations[i].y += currentSpeed * 1.5; if(decorations[i].y > canvas.height) decorations.splice(i, 1); }
            if(Math.random() < 0.1) spawnDeco();
            
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 2; floatingTexts[i].life -= 0.02;
                if(floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            if (weather === "rain") { if(Math.random() < 0.3) weatherParticles.push({x: Math.random()*canvas.width, y: -20, vx: -2, vy: 25, length: 30, type: 'rain'}); } 
            else if (weather === "snow") { if(Math.random() < 0.2) weatherParticles.push({x: Math.random()*canvas.width, y: -20, vx: (Math.random()-0.5)*2, vy: 5 + Math.random()*5, radius: Math.random()*3, type: 'snow'}); }
            for (let i = weatherParticles.length - 1; i >= 0; i--) { let p = weatherParticles[i]; p.x += p.vx; p.y += p.vy; if(p.y > canvas.height) weatherParticles.splice(i, 1); }
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life -= 0.05; if(particles[i].life <= 0) particles.splice(i, 1); }
            
            for (let i = items.length - 1; i >= 0; i--) { 
                items[i].y += currentSpeed; 
                if (checkHit(player, items[i])) { 
                    let type = items[i].type; let m = (carTypes[player.type].traitText.includes("x1.5")) ? 1.5 : 1; 
                    if (type === "shield") player.shield = true; 
                    if (type === "smoke") { policeDist = Math.min(MAX_DIST, policeDist + 150); createParticles(player.x+20, player.y+70, "#fff", 30); } 
                    if (type === "boostGauge") { boostGauge = Math.min(100, boostGauge + 40 * m); addFloatingText(player.x, player.y - 20, "NITRO +", "#00e5ff"); }
                    playDingSound(); items.splice(i, 1); 
                } 
            }
            
            let nmBox = { x: player.x - 25, y: player.y - 25, w: player.w + 50, h: player.h + 50 };

            for (let i = obstacles.length - 1; i >= 0; i--) { 
                let obs = obstacles[i]; obs.y += currentSpeed; 
                if(obs.vx) { obs.x += obs.vx; if(obs.x < 40 || obs.x + obs.w > canvas.width - 40) obs.vx *= -1; }
                
                if (!obs.passed && checkHit(nmBox, obs) && !checkHit(player, obs)) {
                    obs.passed = true; boostGauge = Math.min(100, boostGauge + 10); score += 100;
                    addFloatingText(player.x + 20, player.y - 10, "NEAR MISS!", "#ffeb3b"); playDingSound();
                }

                if (checkHit(player, obs)) { 
                    createParticles(obs.x+obs.w/2, obs.y+obs.h/2, "#ff9800", 20); obstacles.splice(i, 1); 
                    if (isBoosting) { score += 50; addFloatingText(obs.x, obs.y, "SMASH!", "#ff5252"); } 
                    else if (player.shield) { player.shield = false; screenShake = 10; } 
                    else { policeDist -= 150; screenShake = 20; if (policeDist <= 65) { triggerGameOver(); } } 
                } 
            }
            obstacles = obstacles.filter(o => o.y < canvas.height); items = items.filter(i => i.y < canvas.height);
        }

        function draw() {
            if (!isPlaying && !isGameOver) return; // 메뉴일 땐 그리지 않음
            
            ctx.save();
            if(screenShake > 0) { ctx.translate((Math.random()-0.5) * screenShake, (Math.random()-0.5) * screenShake); }
            
            let roadColor = biomes[currentBiome].road;
            if (weather === "rain") roadColor = darkenColor(roadColor, 30);
            if (weather === "snow") roadColor = lightenColor(roadColor, 10);
            
            ctx.fillStyle = roadColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            for(let i = -100; i < canvas.height; i += 90) { 
                ctx.fillRect(140 - 4, i + (roadOffset % 90), 8, 45); ctx.fillRect(240 - 4, i + (roadOffset % 90), 8, 45); ctx.fillRect(340 - 4, i + (roadOffset % 90), 8, 45); 
            }
            for(let i = -100; i < canvas.height; i += 40) { ctx.fillStyle = (Math.floor(i/40)%2===0) ? "#fff" : "#ff5252"; ctx.fillRect(0, i + (roadOffset % 80), 25, 40); ctx.fillRect(canvas.width-25, i + (roadOffset % 80), 25, 40); }
            for(let deco of decorations) { ctx.fillStyle = weather==="snow"?"#eceff1":deco.color; ctx.beginPath(); ctx.roundRect(deco.x, deco.y, deco.w, deco.h, 4); ctx.fill(); }

            for (let it of items) { ctx.save(); ctx.shadowColor = "#00e676"; ctx.shadowBlur = 20; ctx.fillStyle = "#00e676"; ctx.beginPath(); ctx.arc(it.x+13, it.y+13, 16, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "white"; ctx.shadowBlur = 0; ctx.font = "bold 16px sans-serif"; ctx.fillText(it.type === "shield" ? "S" : (it.type === "boostGauge" ? "B" : "M"), it.x + 8, it.y + 19); ctx.restore(); }
            for (let obs of obstacles) { if(obs.type === "obstacleTruck") { drawObstacleTruck(ctx, obs); } else { drawSimpleObstacle(ctx, obs); } }

            ctx.save(); ctx.translate(player.x + player.w/2, player.y + player.h/2); drawDetailedCar(ctx, player, false); ctx.restore();

            if (player.shield) {
                ctx.strokeStyle = "rgba(0, 229, 255, 0.9)"; ctx.lineWidth = 5; ctx.shadowColor="#00e5ff"; ctx.shadowBlur=15;
                ctx.beginPath(); ctx.roundRect(player.x - 10, player.y - 10, player.w + 20, player.h + 20, 15); ctx.stroke(); ctx.shadowBlur=0;
            }
            if (isBoosting) { 
                ctx.fillStyle = "rgba(0,229,255,0.7)"; for(let i=0; i<8; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 80+Math.random()*150); 
                ctx.fillStyle = "#00e5ff"; ctx.shadowColor = "#00b0ff"; ctx.shadowBlur = 30;
                ctx.beginPath(); ctx.moveTo(player.x+10, player.y+player.h); ctx.lineTo(player.x+player.w-10, player.y+player.h); ctx.lineTo(player.x+player.w/2, player.y+player.h+60+Math.random()*40); ctx.fill(); ctx.shadowBlur = 0;
            }

            ctx.save(); ctx.translate(police.x + police.w/2, police.y + police.h/2); let tempPoliceData = { color: "#111", w: police.w, h: police.h, type: 0, vx: 0 }; drawDetailedCar(ctx, tempPoliceData, true); ctx.restore();

            for(let p of particles) { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 3 + p.life*2, 0, Math.PI*2); ctx.fill(); } ctx.globalAlpha = 1.0;
            
            for(let p of weatherParticles) {
                if (p.type === 'rain') { ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + p.vx*5, p.y + p.vy); ctx.stroke(); }
                if (p.type === 'snow') { ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); }
            }

            let cycle = (timeTick % 2400) / 2400; let nightAlpha = 0; if (cycle > 0.4 && cycle < 0.6) nightAlpha = (cycle - 0.4) * 5 * 0.92; else if (cycle >= 0.6 && cycle <= 0.9) nightAlpha = 0.92; else if (cycle > 0.9) nightAlpha = 0.92 - ((cycle - 0.9) * 10 * 0.92);
            if (nightAlpha > 0 || weather === "snow" || weather === "rain") { 
                ctx.save(); 
                let baseDarkness = nightAlpha;
                if (weather === "rain") baseDarkness = Math.max(baseDarkness, 0.4);
                if (weather === "snow") baseDarkness = Math.max(baseDarkness, 0.3); 
                
                ctx.fillStyle = ctx.createRadialGradient(player.x + player.w/2, player.y - 40, 40, player.x + player.w/2, player.y - 40, weather==="snow"?200:350); 
                ctx.fillStyle.addColorStop(0, "rgba(0,0,0,0)"); ctx.fillStyle.addColorStop(0.5, `rgba(10, 10, 25, ${baseDarkness * 0.8})`); ctx.fillStyle.addColorStop(1, `rgba(10, 10, 25, ${baseDarkness})`); 
                ctx.fillRect(0, 0, canvas.width, canvas.height); 

                ctx.globalCompositeOperation = 'screen'; 
                ctx.fillStyle = ctx.createLinearGradient(0, player.y, 0, player.y - (weather==="snow"?200:300)); 
                ctx.fillStyle.addColorStop(0, `rgba(255, 240, 180, ${baseDarkness * 0.5})`); ctx.fillStyle.addColorStop(1, 'rgba(255, 240, 180, 0)'); 
                ctx.beginPath(); ctx.moveTo(player.x + 10, player.y); ctx.lineTo(player.x - 90, player.y - 300); ctx.lineTo(player.x + player.w + 90, player.y - 300); ctx.lineTo(player.x + player.w - 10, player.y); ctx.fill(); ctx.restore(); 
            }
            ctx.restore(); 
            
            for(let ft of floatingTexts) {
                ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color;
                ctx.font = "900 20px 'Montserrat'"; ctx.shadowColor = "#000"; ctx.shadowBlur = 5;
                ctx.fillText(ft.text, ft.x, ft.y); ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, 50);
            ctx.fillStyle = "white"; ctx.font = "bold 20px 'Montserrat'"; ctx.fillText(`LV.${level}`, 15, 32);
            let wIcon = weather === "rain" ? "🌧️" : (weather === "snow" ? "❄️" : ""); ctx.fillText(wIcon, 80, 32);
            ctx.fillStyle = "#00e5ff"; ctx.textAlign = "right"; ctx.fillText(`SCORE ${score}`, canvas.width - 15, 32); ctx.textAlign = "left";
            
            if (levelUpAlpha > 0 && level <= 100) { ctx.save(); ctx.globalAlpha = levelUpAlpha; ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "900 50px 'Montserrat', sans-serif"; ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 20; ctx.fillText(level === 100 ? "MAX LEVEL" : `LEVEL ${level}`, canvas.width/2, canvas.height/2 - 100); ctx.restore(); }
            if (policeDist < 120 && !isGameOver) { let warnFlash = Math.floor(Date.now() / 200) % 2 === 0 ? "#ff1744" : "white"; ctx.fillStyle = warnFlash; ctx.shadowColor = "red"; ctx.shadowBlur = 15; ctx.font = "bold 22px 'Montserrat'"; ctx.fillText("🚨 WARNING", canvas.width / 2 - 60, 32); ctx.shadowBlur = 0; }
            
            // 캔버스 내 게임오버 텍스트 (순간 정지 효과)
            if (isGameOver) { 
                ctx.fillStyle = "rgba(10, 10, 15, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = "#ff1744"; ctx.textAlign = "center"; ctx.save(); 
                ctx.translate(canvas.width/2, canvas.height/2 - 40); ctx.rotate(-0.05); 
                ctx.font = "900 60px 'Montserrat', sans-serif"; ctx.strokeStyle = "#ff1744"; ctx.lineWidth = 6; ctx.strokeText("BUSTED", 0, 0); 
                ctx.fillStyle = "rgba(255, 23, 68, 0.3)"; ctx.fillText("BUSTED", 4, 4); ctx.restore(); 
            }
        }

        ctx.fillStyle = "#1a1a24"; ctx.fillRect(0,0,canvas.width, canvas.height);

        function gameLoop() {
            if (isPlaying || isGameOver) { 
                update(); 
                draw(); 
            }
            requestAnimationFrame(gameLoop);
        }
        
        // 브라우저 켜질 때 빈 캔버스 그리기 및 루프 시동
        gameLoop();
    </script>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>

    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
