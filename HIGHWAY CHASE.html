<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HIGHWAY CHASE - LEADERBOARD EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: oklch(70% 0.3 260);
            --accent: oklch(65% 0.35 15);
            --bg-dark: oklch(10% 0.05 260);
            --glass: rgba(0, 5, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glow-blue: 0 0 30px oklch(70% 0.3 260 / 0.4);
            --glow-red: 0 0 30px oklch(65% 0.35 15 / 0.4);
            --font-main: 'Outfit', sans-serif;
            --font-accent: 'Syncopate', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            background: #000;
            color: white;
            font-family: var(--font-main);
            user-select: none;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer { 
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            background: #05050a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }

        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        /* --- Dynamic Racing Background --- */
        .racing-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(circle at 50% 40%, #1a1a2e 0%, #05050a 100%);
        }

        .highway-perspective {
            position: absolute;
            bottom: -50%;
            left: -50%;
            right: -50%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(300px) rotateX(60deg);
            animation: highwayScroll 1s linear infinite;
        }

        @keyframes highwayScroll {
            from { background-position: 0 0; }
            to { background-position: 0 60px; }
        }

        .speed-line {
            position: absolute;
            background: linear-gradient(to bottom, transparent, rgba(0, 229, 255, 0.4), transparent);
            width: 2px;
            height: 100px;
            filter: blur(1px);
            animation: speedFall linear infinite;
        }

        @keyframes speedFall {
            0% { transform: translateY(-200px) scaleY(0.1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(1200px) scaleY(2); opacity: 0; }
        }

        .speed-line:nth-child(1) { left: 10%; animation-duration: 0.4s; animation-delay: 0.1s; }
        .speed-line:nth-child(2) { left: 30%; animation-duration: 0.7s; animation-delay: 0.3s; }
        .speed-line:nth-child(3) { left: 60%; animation-duration: 0.5s; animation-delay: 0.5s; }
        .speed-line:nth-child(4) { left: 85%; animation-duration: 0.9s; animation-delay: 0s; }

        /* --- HUD Elements --- */
        .hud-bracket {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--primary);
            opacity: 0.3;
        }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bot-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .bot-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        /* --- UI Screens --- */
        .ui-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Chrome Logo --- */
        .logo-box {
            margin-bottom: 40px;
            text-align: center;
            transform: skewX(-15deg);
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.5));
            animation: logoFloat 3s ease-in-out infinite alternate;
        }

        @keyframes logoFloat {
            from { transform: skewX(-15deg) translateY(0); }
            to { transform: skewX(-15deg) translateY(-10px); }
        }

        .chrome-title {
            font-family: var(--font-accent);
            font-size: clamp(52px, 16vw, 76px);
            font-weight: 900;
            line-height: 0.8;
            background: linear-gradient(to bottom, 
                #fff 0%, #fff 48%, 
                #aaa 50%, 
                #00e5ff 52%, #00e5ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-style: italic;
            letter-spacing: -4px;
        }

        .chrome-sub {
            display: block;
            font-size: 28px;
            color: #ff1744;
            text-shadow: 0 0 15px rgba(255, 23, 68, 1);
            letter-spacing: 14px;
            margin-top: 5px;
            font-weight: 900;
        }

        /* --- Dashboard Panel --- */
        .dashboard-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            position: relative;
            clip-path: polygon(10% 0, 100% 0, 100% 85%, 90% 100%, 0 100%, 0 15%);
        }

        .dashboard-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        /* --- Buttons --- */
        .btn-launch {
            background: var(--primary);
            color: black;
            font-family: var(--font-accent);
            font-size: 18px;
            font-weight: 900;
            padding: 20px;
            border: none;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-launch:hover {
            background: #fff;
            transform: scale(1.05) skewX(-5deg);
            box-shadow: 0 0 30px #fff;
        }

        .btn-hall {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            font-family: var(--font-accent);
            font-size: 14px;
            padding: 14px;
            width: 100%;
            cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: all 0.2s;
        }

        .btn-hall:hover {
            background: rgba(0, 229, 255, 0.1);
            color: #fff;
            border-color: #fff;
        }

        /* --- Car Selection (Carries over but optimized) --- */
        .carousel-view {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        #previewCanvas {
            width: 220px; height: 220px;
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.2) 0%, transparent 70%);
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.4));
        }

        /* --- Mobile Controls --- */
        .mobile-ui {
            display: none;
            position: absolute;
            bottom: max(40px, env(safe-area-inset-bottom));
            width: 100%;
            padding: 0 20px;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .touch-btn {
            width: 70px; height: 70px;
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--glow-blue);
        }

        .nitro-btn-touch {
            width: 100px; height: 50px;
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: var(--glow-red);
            font-weight: 900;
        }

        @media (max-width: 1024px) { .mobile-ui { display: flex; } }

        /* Back Button */
        .back-portal {
            position: fixed;
            top: 15px; left: 15px;
            z-index: 1000;
            color: var(--primary);
            text-decoration: none;
            font-size: 10px;
            font-family: var(--font-accent);
            background: rgba(0,0,0,0.8);
            padding: 8px 12px;
            border: 1px solid var(--primary);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        /* --- Leaderboard & Input CSS --- */
        .lb-table {
            width: 100%;
            max-height: 45vh;
            overflow-y: auto;
            padding: 10px;
            margin: 20px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .lb-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-family: var(--font-accent);
            border-left: 3px solid transparent;
            animation: lbSlideIn 0.3s ease-out backwards;
        }

        .lb-row:nth-child(1) { border-left-color: #ffd700; background: rgba(255, 215, 0, 0.1); }
        .lb-row:nth-child(2) { border-left-color: #c0c0c0; background: rgba(192, 192, 192, 0.1); }
        .lb-row:nth-child(3) { border-left-color: #cd7f32; background: rgba(205, 127, 50, 0.1); }

        @keyframes lbSlideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .lb-rank { font-size: 10px; width: 30px; opacity: 0.5; }
        .lb-name { flex: 1; font-size: 16px; font-weight: 700; letter-spacing: 2px; }
        .lb-score { color: var(--primary); text-shadow: var(--glow-blue); font-size: 16px; font-weight: 900; }

        .name-input-group {
            width: 100%;
            margin-bottom: 30px;
            text-align: center;
        }

        .name-label {
            font-family: var(--font-accent);
            font-size: 10px;
            color: var(--primary);
            letter-spacing: 4px;
            margin-bottom: 15px;
            display: block;
        }

        .name-input {
            width: 100%;
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: var(--font-accent);
            font-size: 32px;
            font-weight: 900;
            padding: 20px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            box-shadow: var(--glow-red);
            transition: all 0.3s;
        }

        .name-input:focus {
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
            transform: scale(1.02);
        }

        .name-input::placeholder {
            opacity: 0.2;
            font-size: 18px;
        }
    </style>
</head>
<body style="touch-action: none;">
    <a href="index.html" class="back-portal">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        PLAYGROUND EXIT
    </a>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        
        <!-- HUD Overlays -->
        <div class="hud-bracket top-left"></div>
        <div class="hud-bracket top-right"></div>
        <div class="hud-bracket bot-left"></div>
        <div class="hud-bracket bot-right"></div>

        <!-- Mobile UI Controls -->
        <div class="mobile-ui">
            <div id="btnLeft" class="touch-btn" onmousedown="keys.ArrowLeft=true" onmouseup="keys.ArrowLeft=false" ontouchstart="keys.ArrowLeft=true" ontouchend="keys.ArrowLeft=false">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </div>
            <div id="btnNitro" class="touch-btn nitro-btn-touch" onmousedown="keys.Space=true" onmouseup="keys.Space=false" ontouchstart="keys.Space=true" ontouchend="keys.Space=false">IGNITE</div>
            <div id="btnRight" class="touch-btn" onmousedown="keys.ArrowRight=true" onmouseup="keys.ArrowRight=false" ontouchstart="keys.ArrowRight=true" ontouchend="keys.ArrowRight=false">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </div>

        <!-- Main Screen -->
        <div id="mainScreen" class="ui-screen">
            <div class="logo-box">
                <h1 class="chrome-title">HIGHWAY</h1>
                <span class="chrome-sub">CHASE</span>
            </div>
            
            <div class="dashboard-panel">
                <div style="font-size: 10px; color: var(--primary); margin-bottom: 20px; letter-spacing: 2px; text-align: center;">SYSTEM READY... v2.0</div>
                <button class="btn-launch" onclick="goToCarSelect()">LAUNCH ENGINE</button>
                <button class="btn-hall" onclick="showLeaderboard()">HALL OF FAME</button>
                <div style="margin-top: 20px; font-size: 9px; opacity: 0.5; text-align: center;">USE ARROWS TO STEER • SPACE FOR NITRO</div>
            </div>
        </div>

        <!-- Car Selection -->
        <div id="carSelectScreen" class="ui-screen" style="display: none;">
            <div class="logo-box" style="margin-bottom: 30px; transform: skewX(-15deg) scale(0.6);">
                <h1 class="chrome-title">SELECT</h1>
                <span class="chrome-sub">PLAYER_01</span>
            </div>
            
            <div class="carousel-view">
                <div class="nav-btn" onclick="prevCar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </div>
                
                <div style="text-align: center;">
                    <canvas id="previewCanvas" width="260" height="260"></canvas>
                    <div id="previewName" style="font-family: var(--font-accent); font-size: 28px; font-weight: 900; color: var(--primary);">SEDAN</div>
                    <div id="previewTrait" style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;">STABLE BALANCE</div>
                    
                    <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
                        <div id="previewGauge" style="height: 100%; background: var(--primary); transition: width 0.3s;"></div>
                    </div>
                </div>
                
                <div class="nav-btn" onclick="nextCar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </div>
            
            <div style="width: 100%; max-width: 320px;">
                <button class="btn-launch" onclick="startSelectedCar()">ENGAGE</button>
                <button class="btn-hall" onclick="goToMain()">ABORT</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="ui-screen" style="display: none;">
            <div class="logo-box">
                <h1 class="chrome-title" style="background: linear-gradient(to bottom, #fff 45%, #ff1744 51%); -webkit-background-clip: text;">BUSTED</h1>
            </div>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 12px; opacity: 0.5; letter-spacing: 2px; font-family: var(--font-accent);">TOTAL SCORE</div>
                <div id="finalScoreDisplay" style="font-family: var(--font-accent); font-size: 42px; font-weight: 900; color: #fff;">000,000</div>
            </div>
            
            <div class="dashboard-panel" style="max-width: 380px; padding: 30px;">
                <div class="name-input-group">
                    <span class="name-label">INPUT IDENTIFICATION</span>
                    <input type="text" id="playerNameInput" class="name-input" placeholder="DRIVER_01" maxlength="8" autocomplete="off">
                </div>
                
                <button class="btn-launch" onclick="saveScore()" style="background: var(--accent); margin-bottom: 12px;">REGISTER DATA</button>
                <button class="btn-hall" onclick="skipToMain()">ABANDON MISSION</button>
            </div>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboardScreen" class="ui-screen" style="display: none;">
            <div class="logo-box" style="transform: skewX(-15deg) scale(0.7); margin-bottom: 20px;">
                <h1 class="chrome-title">LEGENDS</h1>
            </div>
            <div id="lbTable" class="lb-table" style="max-height: 40vh;"></div>
            <button class="btn-hall" onclick="goToMain()" style="max-width: 320px;">RETURN TO BASE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // 스크린 객체들
        const mainScreen = document.getElementById("mainScreen");
        const carSelectScreen = document.getElementById("carSelectScreen");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const leaderboardScreen = document.getElementById("leaderboardScreen");

        let isPlaying = false, isGameOver = false;
        let score = 0, timeTick = 0, roadOffset = 0, baseSpeed = 5;
        let foodTruckTimer = 0, policeDist = 350;
        const MAX_DIST = 350;
        let level = 1, levelUpAlpha = 0, screenShake = 0;
        
        let boostGauge = 0; 
        let isBoosting = false;
        let weather = "clear"; 
        let weatherParticles = [];
        let floatingTexts = [];
        let distanceSinceLastSpawn = 0;

        let particles = [], decorations = [], obstacles = [], items = [];
        let currentSelectIndex = 0;

        // --- 사운드 시스템 ---
        let audioCtx, engineOsc, engineGain, sirenOsc, sirenGain;

        function initAudio() {
            if (audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator(); engineGain = audioCtx.createGain();
            engineOsc.type = 'sawtooth'; engineOsc.connect(engineGain); engineGain.connect(audioCtx.destination);
            engineGain.gain.value = 0; engineOsc.start();
            sirenOsc = audioCtx.createOscillator(); sirenGain = audioCtx.createGain();
            sirenOsc.type = 'square'; sirenOsc.connect(sirenGain); sirenGain.connect(audioCtx.destination);
            sirenGain.gain.value = 0; sirenOsc.start();
        }

        function playDingSound() { 
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playLevelUpSound() {
            if(!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function playGameOverSound() {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
            osc.start(); osc.stop(audioCtx.currentTime + 1.2);
        }

        // --- 리더보드 데이터 관리 (localStorage) ---
        let highScores = JSON.parse(localStorage.getItem('highwayChaseScores')) || [];

        function saveScore() {
            let nameInput = document.getElementById("playerNameInput").value.trim().toUpperCase();
            if (nameInput === "") nameInput = "ANON";
            
            highScores.push({ name: nameInput, score: score });
            highScores.sort((a, b) => b.score - a.score); // 점수 내림차순 정렬
            highScores = highScores.slice(0, 10); // 최대 10위까지만 유지
            
            localStorage.setItem('highwayChaseScores', JSON.stringify(highScores));
            showLeaderboard();
        }

        function renderLeaderboardTable() {
            let table = document.getElementById("lbTable");
            table.innerHTML = "";
            if (highScores.length === 0) {
                table.innerHTML = "<div style='text-align:center; color:#90a4ae; padding: 20px;'>NO RECORDS YET</div>";
                return;
            }
            highScores.forEach((record, index) => {
                let row = document.createElement("div");
                row.className = "lb-row";
                row.innerHTML = `
                    <div class="lb-rank">${index + 1}</div>
                    <div class="lb-name">${record.name}</div>
                    <div class="lb-score">${record.score.toLocaleString()}</div>
                `;
                table.appendChild(row);
            });
        }

        function showLeaderboard() {
            hideAllScreens();
            renderLeaderboardTable();
            leaderboardScreen.style.display = "flex";
        }

        // --- 화면 전환 함수들 ---
        function hideAllScreens() {
            mainScreen.style.display = "none";
            carSelectScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            leaderboardScreen.style.display = "none";
        }

        window.goToMain = function() {
            hideAllScreens();
            mainScreen.style.display = "flex";
            // 캔버스 초기화
            ctx.fillStyle = "#1a1a24"; ctx.fillRect(0,0,canvas.width, canvas.height);
        };

        window.goToCarSelect = function() {
            initAudio(); if(audioCtx.state === 'suspended') audioCtx.resume();
            hideAllScreens();
            carSelectScreen.style.display = "flex";
            updateShowroom();

            let currentLevel = Math.floor(score / 500) + 1;
            if (currentLevel > 100) currentLevel = 100; 
            if (currentLevel > level) { level = currentLevel; levelUpAlpha = 1.0; playLevelUpSound(); }
            if (levelUpAlpha > 0) levelUpAlpha -= 0.015; 
            
            if (timeTick % 2000 === 0) {
                let wRand = Math.random();
                if (wRand < 0.3) weather = "rain"; else if (wRand < 0.6) weather = "snow"; else weather = "clear";
            }
            
            let currentFriction = 0.82;
            if (weather === "rain") currentFriction = 0.90; 
            if (weather === "snow") currentFriction = 0.86;

            baseSpeed = 6 + (level * 0.25); 
            currentBiome = Math.floor(score / 2000) % 4;
            
            if (keys.Space && boostGauge > 0) {
                isBoosting = true; boostGauge -= 1.5; 
                if (boostGauge < 0) boostGauge = 0;
            } else { isBoosting = false; }
            
            let currentSpeed = isBoosting ? baseSpeed + 12 : baseSpeed;
            roadOffset += currentSpeed;
            if(screenShake > 0) screenShake--;
            
            if (engineOsc) { engineOsc.frequency.value = 40 + (currentSpeed * 3); engineGain.gain.value = isBoosting ? 0.15 : 0.06; }
            if (sirenOsc) { sirenOsc.frequency.value = 850 + Math.sin(Date.now() / 120) * 200; let sirenVol = Math.max(0, 1 - (policeDist - 60) / 250); sirenGain.gain.value = sirenVol * 0.2; }
            
            let acceleration = player.speed * 0.25; 
            if (keys.ArrowLeft) player.vx -= acceleration; if (keys.ArrowRight) player.vx += acceleration;
            player.vx *= currentFriction; player.x += player.vx;
            
            if (player.x < 40) { player.x = 40; player.vx *= -0.2; } 
            if (player.x + player.w > canvas.width - 40) { player.x = canvas.width - player.w - 40; player.vx *= -0.2; }
            
            let recoveryRate = 0.6 - (level * 0.005); 
            if (recoveryRate < 0.05) recoveryRate = 0.05; 
            if (policeDist < MAX_DIST) policeDist += recoveryRate;
            police.y = player.y + policeDist; police.vx = (player.x - police.x + (player.w - police.w)/2) * 0.08; police.x += police.vx;
            if (carTypes[player.type].traitText.includes("Police") && ++foodTruckTimer > 250) { policeDist += 50; foodTruckTimer = 0; }
            if (player.boost > 0) player.boost--;
            
            distanceSinceLastSpawn += currentSpeed;
            let spawnInterval = Math.max(200, 450 - (level * 3.5));
            if (distanceSinceLastSpawn > spawnInterval) { spawnObjects(); distanceSinceLastSpawn = 0; }
            
            for (let i = decorations.length - 1; i >= 0; i--) { decorations[i].y += currentSpeed * 1.5; if(decorations[i].y > canvas.height) decorations.splice(i, 1); }
            if(Math.random() < 0.1) spawnDeco();
            
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 2; floatingTexts[i].life -= 0.02;
                if(floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            if (weather === "rain") { if(Math.random() < 0.3) weatherParticles.push({x: Math.random()*canvas.width, y: -20, vx: -2, vy: 25, length: 30, type: 'rain'}); } 
            else if (weather === "snow") { if(Math.random() < 0.2) weatherParticles.push({x: Math.random()*canvas.width, y: -20, vx: (Math.random()-0.5)*2, vy: 5 + Math.random()*5, radius: Math.random()*3, type: 'snow'}); }
            for (let i = weatherParticles.length - 1; i >= 0; i--) { let p = weatherParticles[i]; p.x += p.vx; p.y += p.vy; if(p.y > canvas.height) weatherParticles.splice(i, 1); }
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life -= 0.05; if(particles[i].life <= 0) particles.splice(i, 1); }
            
            for (let i = items.length - 1; i >= 0; i--) { 
                items[i].y += currentSpeed; 
                if (checkHit(player, items[i])) { 
                    let type = items[i].type; let m = (carTypes[player.type].traitText.includes("x1.5")) ? 1.5 : 1; 
                    if (type === "shield") player.shield = true; 
                    if (type === "smoke") { policeDist = Math.min(MAX_DIST, policeDist + 150); createParticles(player.x+20, player.y+70, "#fff", 30); } 
                    if (type === "boostGauge") { boostGauge = Math.min(100, boostGauge + 40 * m); addFloatingText(player.x, player.y - 20, "NITRO +", "#00e5ff"); }
                    playDingSound(); items.splice(i, 1); 
                } 
            }
            
            let nmBox = { x: player.x - 25, y: player.y - 25, w: player.w + 50, h: player.h + 50 };

            for (let i = obstacles.length - 1; i >= 0; i--) { 
                let obs = obstacles[i]; obs.y += currentSpeed; 
                if(obs.vx) { obs.x += obs.vx; if(obs.x < 40 || obs.x + obs.w > canvas.width - 40) obs.vx *= -1; }
                
                if (!obs.passed && checkHit(nmBox, obs) && !checkHit(player, obs)) {
                    obs.passed = true; boostGauge = Math.min(100, boostGauge + 10); score += 100;
                    addFloatingText(player.x + 20, player.y - 10, "NEAR MISS!", "#ffeb3b"); playDingSound();
                }

                if (checkHit(player, obs)) { 
                    createParticles(obs.x+obs.w/2, obs.y+obs.h/2, "#ff9800", 20); obstacles.splice(i, 1); 
                    if (isBoosting) { score += 50; addFloatingText(obs.x, obs.y, "SMASH!", "#ff5252"); } 
                    else if (player.shield) { player.shield = false; screenShake = 10; } 
                    else { policeDist -= 150; screenShake = 20; if (policeDist <= 65) { triggerGameOver(); } } 
                } 
            }
            obstacles = obstacles.filter(o => o.y < canvas.height); items = items.filter(i => i.y < canvas.height);
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            if (!isPlaying) {
                // --- Menu Demo Scene ---
                currentBiome = 0; // Neon City for menu vibe
                drawRoad();
                
                // Draw a demo car drifting slightly
                ctx.save();
                ctx.translate(canvas.width/2 + Math.sin(timeTick*0.03)*30, canvas.height/2 + 100 + Math.cos(timeTick*0.05)*5);
                ctx.rotate(Math.sin(timeTick*0.03)*0.05);
                let demoCar = { type: 1, color: "#e53935", w: 48, h: 86, vx: Math.sin(timeTick*0.03)*4 };
                drawDetailedCar(ctx, demoCar, false);
                ctx.restore();
                
                // Overlay dark gradient to make UI pop
                let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, "rgba(0,0,0,0.4)");
                grad.addColorStop(0.5, "transparent");
                grad.addColorStop(1, "rgba(0,0,0,0.8)");
                ctx.fillStyle = grad;
                ctx.fillRect(0,0,canvas.width, canvas.height);
                
                return;
            }

            // Normal Game Draw
            ctx.save();
            if(screenShake > 0) { ctx.translate((Math.random()-0.5) * screenShake, (Math.random()-0.5) * screenShake); }
            
            drawRoad();
            
            for(let deco of decorations) { ctx.fillStyle = weather==="snow"?"#eceff1":deco.color; ctx.beginPath(); ctx.roundRect(deco.x, deco.y, deco.w, deco.h, 4); ctx.fill(); }

            for (let it of items) { ctx.save(); ctx.shadowColor = "#00e676"; ctx.shadowBlur = 20; ctx.fillStyle = "#00e676"; ctx.beginPath(); ctx.arc(it.x+13, it.y+13, 16, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "white"; ctx.shadowBlur = 0; ctx.font = "bold 16px sans-serif"; ctx.fillText(it.type === "shield" ? "S" : (it.type === "boostGauge" ? "B" : "M"), it.x + 8, it.y + 19); ctx.restore(); }
            for (let obs of obstacles) { if(obs.type === "obstacleTruck") { drawObstacleTruck(ctx, obs); } else { drawSimpleObstacle(ctx, obs); } }

            ctx.save(); ctx.translate(player.x + player.w/2, player.y + player.h/2); drawDetailedCar(ctx, player, false); ctx.restore();

            if (player.shield) {
                ctx.strokeStyle = "rgba(0, 229, 255, 0.9)"; ctx.lineWidth = 5; ctx.shadowColor="#00e5ff"; ctx.shadowBlur=15;
                ctx.beginPath(); ctx.roundRect(player.x - 10, player.y - 10, player.w + 20, player.h + 20, 15); ctx.stroke(); ctx.shadowBlur=0;
            }
            if (isBoosting) { 
                ctx.fillStyle = "rgba(0,229,255,0.7)"; for(let i=0; i<8; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 80+Math.random()*150); 
                ctx.fillStyle = "#00e5ff"; ctx.shadowColor = "#00b0ff"; ctx.shadowBlur = 30;
                ctx.beginPath(); ctx.moveTo(player.x+10, player.y+player.h); ctx.lineTo(player.x+player.w-10, player.y+player.h); ctx.lineTo(player.x+player.w/2, player.y+player.h+60+Math.random()*40); ctx.fill(); ctx.shadowBlur = 0;
            }

            ctx.save(); ctx.translate(police.x + police.w/2, police.y + police.h/2); let tempPoliceData = { color: "#111", w: police.w, h: police.h, type: 0, vx: 0 }; drawDetailedCar(ctx, tempPoliceData, true); ctx.restore();

            for(let p of particles) { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 3 + p.life*2, 0, Math.PI*2); ctx.fill(); } ctx.globalAlpha = 1.0;
            
            for(let p of weatherParticles) {
                if (p.type === 'rain') { ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + p.vx*5, p.y + p.vy); ctx.stroke(); }
                if (p.type === 'snow') { ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); }
            }

            let cycle = (timeTick % 2400) / 2400; let nightAlpha = 0; if (cycle > 0.4 && cycle < 0.6) nightAlpha = (cycle - 0.4) * 5 * 0.92; else if (cycle >= 0.6 && cycle <= 0.9) nightAlpha = 0.92; else if (cycle > 0.9) nightAlpha = 0.92 - ((cycle - 0.9) * 10 * 0.92);
            if (nightAlpha > 0 || weather === "snow" || weather === "rain") { 
                ctx.save(); 
                let baseDarkness = nightAlpha;
                if (weather === "rain") baseDarkness = Math.max(baseDarkness, 0.4);
                if (weather === "snow") baseDarkness = Math.max(baseDarkness, 0.3); 
                
                ctx.fillStyle = ctx.createRadialGradient(player.x + player.w/2, player.y - 40, 40, player.x + player.w/2, player.y - 40, weather==="snow"?200:350); 
                ctx.fillStyle.addColorStop(0, "rgba(0,0,0,0)"); ctx.fillStyle.addColorStop(0.5, `rgba(10, 10, 25, ${baseDarkness * 0.8})`); ctx.fillStyle.addColorStop(1, `rgba(10, 10, 25, ${baseDarkness})`); 
                ctx.fillRect(0, 0, canvas.width, canvas.height); 

                ctx.globalCompositeOperation = 'screen'; 
                ctx.fillStyle = ctx.createLinearGradient(0, player.y, 0, player.y - (weather==="snow"?200:300)); 
                ctx.fillStyle.addColorStop(0, `rgba(255, 240, 180, ${baseDarkness * 0.5})`); ctx.fillStyle.addColorStop(1, 'rgba(255, 240, 180, 0)'); 
                ctx.beginPath(); ctx.moveTo(player.x + 10, player.y); ctx.lineTo(player.x - 90, player.y - 300); ctx.lineTo(player.x + player.w + 90, player.y - 300); ctx.lineTo(player.x + player.w - 10, player.y); ctx.fill(); ctx.restore(); 
            }
            ctx.restore(); 
            
            for(let ft of floatingTexts) {
                ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color;
                ctx.font = "900 20px 'Montserrat'"; ctx.shadowColor = "#000"; ctx.shadowBlur = 5;
                ctx.fillText(ft.text, ft.x, ft.y); ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, 50);
            ctx.fillStyle = "white"; ctx.font = "bold 20px Outfit"; ctx.fillText(`LV.${level}`, 15, 32);
            let wIcon = weather === "rain" ? "🌧️" : (weather === "snow" ? "❄️" : ""); ctx.fillText(wIcon, 80, 32);
            ctx.fillStyle = "#00e5ff"; ctx.textAlign = "right"; ctx.font = "900 20px Outfit"; ctx.fillText(`SCORE ${score.toLocaleString()}`, canvas.width - 15, 32); ctx.textAlign = "left";
            
            // --- Canvas Nitro Gauge (Integrated HUD) ---
            let barW = 160, barH = 10, bx = canvas.width/2 - barW/2, by = 65;
            // BG
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(bx - 5, by - 5, barW + 10, barH + 15);
            ctx.lineWidth = 1; ctx.strokeStyle = "rgba(0, 229, 255, 0.3)"; ctx.strokeRect(bx-5, by-5, barW+10, barH+15);
            
            // Nitro Text
            ctx.fillStyle = "#00e5ff"; ctx.font = "900 8px Syncopate"; ctx.textAlign = "center";
            ctx.fillText("NITRO SYSTEM", canvas.width/2, by + barH + 6);
            
            // Progress Bar
            ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(bx, by, barW, barH);
            let fillW = (boostGauge / 100) * barW;
            let grad = ctx.createLinearGradient(bx, 0, bx + barW, 0);
            grad.addColorStop(0, "#0057ff"); grad.addColorStop(1, "#00e5ff");
            ctx.fillStyle = grad;
            ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 10;
            ctx.fillRect(bx, by, fillW, barH);
            ctx.shadowBlur = 0;
            
            // Segments
            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 2;
            for(let i=1; i<10; i++) { ctx.beginPath(); ctx.moveTo(bx + (i*barW/10), by); ctx.lineTo(bx + (i*barW/10), by + barH); ctx.stroke(); }
            ctx.textAlign = "left";
            
            if (levelUpAlpha > 0 && level <= 100) { ctx.save(); ctx.globalAlpha = levelUpAlpha; ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "900 50px 'Montserrat', sans-serif"; ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 20; ctx.fillText(level === 100 ? "MAX LEVEL" : `LEVEL ${level}`, canvas.width/2, canvas.height/2 - 100); ctx.restore(); }
            if (policeDist < 120 && !isGameOver) { let warnFlash = Math.floor(Date.now() / 200) % 2 === 0 ? "#ff1744" : "white"; ctx.fillStyle = warnFlash; ctx.shadowColor = "red"; ctx.shadowBlur = 15; ctx.font = "bold 22px 'Montserrat'"; ctx.fillText("🚨 WARNING", canvas.width / 2 - 60, 32); ctx.shadowBlur = 0; }
            
            if (isGameOver) { 
                ctx.fillStyle = "rgba(10, 10, 15, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = "#ff1744"; ctx.textAlign = "center"; ctx.save(); 
                ctx.translate(canvas.width/2, canvas.height/2 - 40); ctx.rotate(-0.05); 
                ctx.font = "900 60px 'Montserrat', sans-serif"; ctx.strokeStyle = "#ff1744"; ctx.lineWidth = 6; ctx.strokeText("BUSTED", 0, 0); 
                ctx.fillStyle = "rgba(255, 23, 68, 0.3)"; ctx.fillText("BUSTED", 4, 4); ctx.restore(); 
            }
        }

        function drawRoad() {
            let roadColor = biomes[currentBiome].road;
            if (weather === "rain") roadColor = darkenColor(roadColor, 30);
            if (weather === "snow") roadColor = lightenColor(roadColor, 10);
            ctx.fillStyle = roadColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            for(let i = -100; i < canvas.height; i += 90) { 
                ctx.fillRect(140 - 4, i + (roadOffset % 90), 8, 45); ctx.fillRect(240 - 4, i + (roadOffset % 90), 8, 45); ctx.fillRect(340 - 4, i + (roadOffset % 90), 8, 45); 
            }
            for(let i = -100; i < canvas.height; i += 40) { ctx.fillStyle = (Math.floor(i/40)%2===0) ? "#fff" : "#ff5252"; ctx.fillRect(0, i + (roadOffset % 80), 25, 40); ctx.fillRect(canvas.width-25, i + (roadOffset % 80), 25, 40); }
        }

        ctx.fillStyle = "#1a1a24"; ctx.fillRect(0,0,canvas.width, canvas.height);

        function gameLoop() {
            update(); 
            draw(); 
            requestAnimationFrame(gameLoop);
        }
        
        // 브라우저 켜질 때 빈 캔버스 그리기 및 루프 시동
        gameLoop();
    </script>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>

    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
