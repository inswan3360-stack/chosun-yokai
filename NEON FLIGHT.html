<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON FLIGHT | BLIPZONES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00de;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050505;
            font-family: 'Outfit', sans-serif; color: white;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        #view-container { width: 100%; height: 100%; position: relative; }
        canvas { display: block; width: 100% !important; height: 100% !important; }

        /* --- HUD Overlay --- */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 30px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; }

        .stat-group { display: flex; flex-direction: column; gap: 5px; }
        .label { 
            font-family: 'Syncopate', sans-serif; font-size: 10px; font-weight: 700; 
            color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); letter-spacing: 2px;
        }
        .value { font-size: 28px; font-weight: 900; letter-spacing: 1px; color: #fff; }
        .value.green { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }

        .life-bar-wrap { width: 120px; height: 14px; background: rgba(255,255,255,0.1); border: 1px solid var(--neon-green); margin-top: 5px; position: relative; }
        .life-bar { height: 100%; background: var(--neon-green); transition: width 0.3s; box-shadow: 0 0 15px var(--neon-green); }

        .boost-bar-wrap { width: 150px; height: 8px; background: rgba(0,243,255,0.1); margin-top: 5px; }
        .boost-bar { height: 100%; background: var(--neon-cyan); transition: width 0.1s; box-shadow: 0 0 10px var(--neon-cyan); }

        .bottom-stat { background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); padding: 15px; border-left: 3px solid var(--neon-green); border-radius: 0 8px 8px 0; }

        #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 15;
            opacity: 0.4;
        }

        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 120%);
            pointer-events: none; z-index: 12;
        }

        /* --- Menu & Overlays --- */
        #menu, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 100;
        }

        .title { 
            font-family: 'Syncopate', sans-serif; font-size: 60px; font-weight: 700; 
            color: #fff; text-shadow: 0 0 30px var(--neon-cyan); margin-bottom: 40px;
            text-align: center; line-height: 1;
        }
        .title span { color: var(--neon-green); text-shadow: 0 0 30px var(--neon-green); }

        .btn {
            padding: 18px 50px; background: transparent; border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); font-family: 'Syncopate', sans-serif; font-weight: 700;
            font-size: 18px; cursor: pointer; transition: 0.3s; letter-spacing: 4px; border-radius: 4px;
            text-shadow: 0 0 10px var(--neon-cyan); box-shadow: 0 0 20px rgba(0,243,255,0.2);
        }
        .btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 50px var(--neon-cyan); }

        #controls-info { margin-top: 30px; font-size: 14px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; }

        #game-over { display: none; }
        .final-score { font-size: 40px; margin-bottom: 20px; color: var(--neon-green); }

        /* --- Mobile Controls --- */
        #mobile-controls {
            position: absolute; bottom: 30px; width: 100%; display: none;
            justify-content: center; gap: 40px; pointer-events: none; z-index: 20;
        }
        .m-btn {
            width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.1);
            border: 2px solid var(--neon-cyan); display: flex; align-items: center; justify-content: center;
            pointer-events: auto; backdrop-filter: blur(10px); color: var(--neon-cyan); font-weight: 900;
            user-select: none; -webkit-user-drag: none;
        }
        .m-btn:active { background: var(--neon-cyan); color: #000; scale: 0.9; }

        @media (max-width: 768px) {
            #mobile-controls { display: flex; }
            .title { font-size: 36px; }
            .hud-top, .hud-bottom { padding: 10px; }
            .value { font-size: 20px; }
        }

        /* Back Link */
        #back-link {
            position: absolute; top: 10px; left: 10px; z-index: 50;
            color: var(--neon-cyan); text-decoration: none; font-size: 10px;
            font-family: 'Syncopate', sans-serif; opacity: 0.6; transition: 0.3s;
            border: 1px solid rgba(0, 243, 255, 0.2); padding: 5px 10px; border-radius: 4px;
        }
        #back-link:hover { opacity: 1; background: rgba(0, 243, 255, 0.1); border-color: var(--neon-cyan); }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3097458973063020"
         crossorigin="anonymous"></script>
</head>
<body>

<div id="view-container">
    <a href="index.html" id="back-link">← EXIT TO PLAYGROUND</a>
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <!-- HUD Overlay -->
    <div id="hud" style="display: none;">
        <div class="hud-top">
            <div class="stat-group">
                <div class="label">SCORE</div>
                <div id="score-val" class="value">000,000</div>
                <div class="label" style="margin-top: 10px;">COMBO</div>
                <div id="combo-val" class="value green">1x</div>
            </div>
            <div class="stat-group" style="text-align: right;">
                <div class="label">LIFE</div>
                <div class="life-bar-wrap">
                    <div id="life-bar" class="life-bar" style="width: 100%;"></div>
                </div>
                <div class="label" style="margin-top: 15px;">BOOST ENERGY</div>
                <div class="boost-bar-wrap">
                    <div id="boost-bar" class="boost-bar" style="width: 100%;"></div>
                </div>
            </div>
        </div>

        <div class="hud-bottom">
            <div class="bottom-stat">
                <div class="label">AIRSPEED</div>
                <div class="value"><span id="speed-val">0</span> <small style="font-size: 10px;">KM/H</small></div>
                <div class="label" style="margin-top: 10px;">ALTITUDE</div>
                <div class="value"><span id="alt-val">0</span> <small style="font-size: 10px;">M</small></div>
            </div>
            <div class="bottom-stat" style="text-align: right; border-left: none; border-right: 3px solid var(--neon-green); border-radius: 8px 0 0 8px;">
                <div class="label">DISTANCE</div>
                <div class="value"><span id="dist-val">0.0</span> <small style="font-size: 10px;">KM</small></div>
                <div class="label" style="margin-top: 10px;">NEXT GATE</div>
                <div class="value"><span id="next-gate-val">---</span> <small style="font-size: 10px;">M</small></div>
            </div>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <div class="m-btn" id="m-left">L</div>
        <div class="m-btn" id="m-boost" style="border-color: var(--neon-green); color: var(--neon-green);">BOOST</div>
        <div class="m-btn" id="m-right">R</div>
    </div>

    <!-- Menus -->
    <div id="menu">
        <h1 class="title">NEON<br><span>FLIGHT</span></h1>
        <button class="btn" id="start-btn">ENGAGE SYSTEM</button>
        <div id="controls-info">WASD / ARROWS to Fly | SPACE for BOOST</div>
    </div>

    <div id="game-over">
        <h1 class="title">SYSTEM<span> CRASH</span></h1>
        <div class="final-score" id="final-score">SCORE: 0</div>
        <button class="btn" id="restart-btn">REBOOT</button>
    </div>
</div>

<!-- Three.js & Post Processing -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { CopyShader } from 'three/addons/shaders/CopyShader.js';

    // --- GAME CONSTANTS ---
    const WORLD_SPEED_BASE = 1.0;
    const HORIZONTAL_SPEED = 0.5;
    const VERTICAL_SPEED = 0.4;
    const MAX_X = 80;
    const MAX_Y = 100;
    const MIN_Y = 5;

    // --- STATE ---
    let isPlaying = false;
    let isGameOver = false;
    let score = 0;
    let combo = 1;
    let distance = 0;
    let life = 100;
    let boost = 100;
    let currentSpeed = WORLD_SPEED_BASE;
    let time = 0;

    const keys = {};
    const gates = [];
    const particles = [];
    let worldGroup;

    // --- THREE SETUP ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.003);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.getElementById('view-container').appendChild(renderer.domElement);

    // POST PROCESSING
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.2;
    bloomPass.strength = 1.8;
    bloomPass.radius = 1.0;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // --- ASSETS ---
    
    // Player Jet
    const jetGroup = new THREE.Group();
    const bodyGeo = new THREE.ConeGeometry(2, 8, 4);
    bodyGeo.rotateX(Math.PI / 2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00f3ff, emissive: 0x00f3ff, emissiveIntensity: 2 });
    const jetBody = new THREE.Mesh(bodyGeo, bodyMat);
    jetGroup.add(jetBody);

    const wingGeo = new THREE.BoxGeometry(8, 0.2, 3);
    const jetWings = new THREE.Mesh(wingGeo, bodyMat);
    jetWings.position.z = 2;
    jetGroup.add(jetWings);

    // Engine Trails
    const thrusterGeo = new THREE.BoxGeometry(0.5, 0.5, 2);
    const thrusterMat = new THREE.MeshBasicMaterial({ color: 0xff00de });
    const lThruster = new THREE.Mesh(thrusterGeo, thrusterMat);
    lThruster.position.set(-1.5, 0, 4);
    const rThruster = new THREE.Mesh(thrusterGeo, thrusterMat);
    rThruster.position.set(1.5, 0, 4);
    jetGroup.add(lThruster, rThruster);

    scene.add(jetGroup);
    jetGroup.position.set(0, 20, 0);

    // LIGHTING
    const ambient = new THREE.AmbientLight(0x404040, 1);
    scene.add(ambient);
    const point = new THREE.PointLight(0x39ff14, 10, 100);
    jetGroup.add(point);

    // WORLD OBJECTS
    worldGroup = new THREE.Group();
    scene.add(worldGroup);

    // Infinite Grid
    const gridHelper = new THREE.GridHelper(5000, 100, 0x39ff14, 0x003300);
    gridHelper.position.y = -1;
    worldGroup.add(gridHelper);

    // Neon City Background (Silhouettes)
    function createCity() {
        for(let i=0; i<80; i++) {
            const h = 50 + Math.random() * 200;
            const w = 15 + Math.random() * 30;
            const geo = new THREE.BoxGeometry(w, h, w);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a0a,
                emissive: 0x003344,
                emissiveIntensity: Math.random() * 0.5
            });
            const b = new THREE.Mesh(geo, mat);
            b.position.set((Math.random() - 0.5) * 2000, h/2 - 2, -1000 - Math.random() * 1000);
            worldGroup.add(b);

            // Neon Windows/Lines
            if(Math.random() > 0.5) {
                const lineGeo = new THREE.BoxGeometry(w + 1, 2, w + 1);
                const lineMat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0x00f3ff : 0xbc13fe });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.position.copy(b.position);
                line.position.y += (Math.random() - 0.5) * h;
                worldGroup.add(line);
            }
        }
    }
    createCity();

    // --- LOGIC ---

    function createGate(z = -500) {
        const radius = 15 + Math.random() * 10;
        const gateGroup = new THREE.Group();
        
        // Hexagon shape
        const shape = new THREE.Shape();
        for(let i=0; i<6; i++) {
            const ang = (i / 6) * Math.PI * 2;
            const x = Math.cos(ang) * radius;
            const y = Math.sin(ang) * radius;
            if(i === 0) shape.moveTo(x,y); else shape.lineTo(x,y);
        }
        shape.closePath();

        const points = shape.getPoints();
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color: 0x39ff14, linewidth: 3 });
        const line = new THREE.LineLoop(geometry, material);
        
        gateGroup.add(line);
        // Inner Glow Mesh (Transparent)
        const innerGeo = new THREE.ShapeGeometry(shape);
        const innerMat = new THREE.MeshBasicMaterial({ color: 0x39ff14, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
        const inner = new THREE.Mesh(innerGeo, innerMat);
        gateGroup.add(inner);

        gateGroup.position.set((Math.random() - 0.5) * 100, 15 + Math.random() * 40, z);
        gateGroup.userData = { passed: false, radius: radius };
        
        worldGroup.add(gateGroup);
        gates.push(gateGroup);
    }

    function createExplosion(pos, color = 0x39ff14) {
        for(let i=0; i<20; i++) {
            const p = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.5, 0.5),
                new THREE.MeshBasicMaterial({ color: color })
            );
            p.position.copy(pos);
            const vel = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2);
            particles.push({ mesh: p, vel: vel, life: 1.0 });
            scene.add(p);
        }
    }

    // --- GAME LOOP ---
    function update(delta) {
        if(!isPlaying || isGameOver) return;

        time += delta;
        
        // Input Handling
        const moveX = (keys['a'] || keys['ArrowLeft'] ? -1 : 0) + (keys['d'] || keys['ArrowRight'] ? 1 : 0);
        const moveY = (keys['w'] || keys['ArrowUp'] ? 1 : 0) + (keys['s'] || keys['ArrowDown'] ? -1 : 0);
        
        // Mobile overrides
        let mX = 0;
        if(document.getElementById('m-left').isDown) mX = -1;
        if(document.getElementById('m-right').isDown) mX = 1;

        const effectiveX = moveX || mX;

        jetGroup.position.x += effectiveX * HORIZONTAL_SPEED * (currentSpeed / WORLD_SPEED_BASE) * (delta * 60);
        jetGroup.position.y += moveY * VERTICAL_SPEED * (currentSpeed / WORLD_SPEED_BASE) * (delta * 60);

        // Constraints
        jetGroup.position.x = Math.max(-MAX_X, Math.min(MAX_X, jetGroup.position.x));
        jetGroup.position.y = Math.max(MIN_Y, Math.min(MAX_Y, jetGroup.position.y));

        // Tilt effect
        jetGroup.rotation.z = -effectiveX * 0.4;
        jetGroup.rotation.x = -moveY * 0.2;

        // Boost
        const boosting = keys[' '] || document.getElementById('m-boost').isDown;
        if(boosting && boost > 0) {
            currentSpeed = WORLD_SPEED_BASE * 2.5;
            boost -= 0.5;
            camera.fov = THREE.MathUtils.lerp(camera.fov, 90, 0.1);
            camera.updateProjectionMatrix();
            lThruster.scale.set(1.5, 1.5, 2.5);
            rThruster.scale.set(1.5, 1.5, 2.5);
        } else {
            currentSpeed = WORLD_SPEED_BASE;
            if(boost < 100) boost += 0.1;
            camera.fov = THREE.MathUtils.lerp(camera.fov, 75, 0.05);
            camera.updateProjectionMatrix();
            lThruster.scale.set(1, 1, 1);
            rThruster.scale.set(1, 1, 1);
        }

        // Move World
        worldGroup.position.z += currentSpeed * (delta * 120);
        distance += (currentSpeed * 0.01);

        // Spawn Gates
        if(gates.length === 0 || gates[gates.length - 1].position.z + worldGroup.position.z > -400) {
            createGate(-worldGroup.position.z - 600);
        }

        // Gate Management & Collision
        let nearestDist = 9999;
        for(let i = gates.length - 1; i >= 0; i--) {
            const g = gates[i];
            const worldZ = g.position.z + worldGroup.position.z;
            
            if(worldZ > -200) nearestDist = Math.min(nearestDist, Math.abs(worldZ));

            // Pass Gate
            if(!g.userData.passed && worldZ > 0) {
                const distToGate = jetGroup.position.distanceTo(g.position.clone().add(new THREE.Vector3(0,0, worldZ)));
                // Approximate 2D distance
                const dx = jetGroup.position.x - g.position.x;
                const dy = jetGroup.position.y - g.position.y;
                const dist2D = Math.sqrt(dx*dx + dy*dy);

                if(dist2D < g.userData.radius) {
                    // SUCCESS
                    score += 500 * combo;
                    combo++;
                    createExplosion(g.position.clone().add(new THREE.Vector3(0,0,g.position.z)), 0x00f3ff);
                    g.userData.passed = true;
                } else {
                    // FAIL
                    life -= 20;
                    combo = 1;
                    g.userData.passed = true;
                    if(life <= 0) endGame();
                }
            }

            // Cleanup
            if(worldZ > 50) {
                gates.splice(i, 1);
                worldGroup.remove(g);
            }
        }

        // Particles
        for(let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.mesh.position.add(p.vel);
            p.life -= 0.02;
            p.mesh.scale.setScalar(p.life);
            if(p.life <= 0) {
                scene.remove(p.mesh);
                particles.splice(i, 1);
            }
        }

        updateHUD(nearestDist);
    }

    function updateHUD(nearestDist) {
        document.getElementById('score-val').innerText = Math.floor(score).toLocaleString().padStart(7, '0');
        document.getElementById('combo-val').innerText = `${combo}x`;
        document.getElementById('life-bar').style.width = `${life}%`;
        document.getElementById('boost-bar').style.width = `${boost}%`;
        document.getElementById('speed-val').innerText = Math.floor(currentSpeed * 400);
        document.getElementById('alt-val').innerText = Math.floor(jetGroup.position.y);
        document.getElementById('dist-val').innerText = distance.toFixed(1);
        document.getElementById('next-gate-val').innerText = nearestDist > 900 ? "---" : Math.floor(nearestDist);
    }

    function endGame() {
        isGameOver = true;
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('final-score').innerText = `SCORE: ${Math.floor(score)}`;
        document.getElementById('hud').style.display = 'none';
    }

    function resetGame() {
        score = 0; combo = 1; distance = 0; life = 100; boost = 100;
        isGameOver = false; isPlaying = true;
        jetGroup.position.set(0, 20, 0);
        worldGroup.position.z = 0;
        gates.forEach(g => worldGroup.remove(g));
        gates.length = 0;
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
    }

    // --- EVENTS ---
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        isPlaying = true;
    };

    document.getElementById('restart-btn').onclick = resetGame;

    // Mobile inputs
    const setMobileBtn = (id) => {
        const btn = document.getElementById(id);
        btn.isDown = false;
        btn.addEventListener('pointerdown', () => btn.isDown = true);
        btn.addEventListener('pointerup', () => btn.isDown = false);
        btn.addEventListener('pointerleave', () => btn.isDown = false);
    };
    setMobileBtn('m-left');
    setMobileBtn('m-right');
    setMobileBtn('m-boost');

    // --- RENDER LOOP ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        update(clock.getDelta());
        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
