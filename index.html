<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조선 팔도 기이한 이야기</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    :root {
      --ink: #0a0c10;
      --paper: #e8d09a;
      --gold: #b08a40;
      --gold-bright: #f8d060;
      --accent: #8b2222;
      --glass: rgba(15, 18, 22, 0.95);
      --border: #b08a40;
      --muted: #888888; /* <<< 누락되었던 변수 추가 */
    }

    * { 
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
        background: var(--ink);
        color: var(--paper);
        font-family: 'Noto Sans KR', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        background-image: 
          radial-gradient(circle at 50% 50%, rgba(40, 30, 10, 0.3) 0%, transparent 70%), 
          url('https://www.transparenttextures.com/patterns/dark-matter.png');
    }

    #app {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .entry-header {
      margin-bottom: 60px;
      position: relative;
    }

    .entry-subtitle {
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--gold);
      margin-bottom: 12px;
      font-weight: 700;
      opacity: 0.7;
      text-transform: uppercase;
    }

    .entry-title {
      font-size: 44px;
      font-weight: 900;
      color: var(--paper);
      margin: 0;
      line-height: 1.15;
      letter-spacing: -2px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .entry-title span {
      color: var(--gold-bright);
      display: block;
      margin-top: 8px;
      filter: drop-shadow(0 0 15px rgba(248, 208, 96, 0.3));
    }

    .entry-seal {
      position: absolute;
      top: -10px;
      right: -35px;
      width: 48px;
      height: 48px;
      background: var(--accent);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      border-radius: 3px;
      transform: rotate(8deg);
      box-shadow: 3px 3px 15px rgba(0,0,0,0.4);
      border: 1px solid rgba(0,0,0,0.3);
      line-height: 1.1;
      padding: 2px;
      pointer-events: none;
    }

    .entry-cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .entry-card {
      background: var(--glass);
      border: 1px solid var(--border);
      padding: 30px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .entry-card:hover {
      border-color: var(--gold);
      background: rgba(30, 35, 45, 0.9);
      transform: translateY(-3px);
    }

    .entry-card h2 {
      font-size: 20px;
      margin: 0 0 10px 0;
      font-weight: 700;
    }

    .entry-card p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .entry-card.yokai h2 { color: #b0f080; }
    .entry-card.glitch h2 { color: #00ff88; }
  </style>
</head>
<body>
  <div id="app">
    <div class="entry-header">
      <div class="entry-subtitle">KOREAN MYTH & LEGEND</div>
      <h1 class="entry-title">조선 팔도<br><span>기이한 이야기</span></h1>
      <div class="entry-seal">朝鮮<br>傳說</div>
    </div>
    <div class="entry-cards">
      <div class="entry-card yokai" onclick="location.href='yokai.html'">
        <h2>🐉 조선 요괴 전생기</h2>
        <p>전생의 기운으로 다시 태어난<br>요괴를 키우고 신수로 승천시키소서.</p>
      </div>
      <div class="entry-card glitch" onclick="location.href='!DOCTYPE.html'">
        <h2>✈️ Flight Glitch</h2>
        <p>고도 제한과 바다의 괴물을 피해<br>끝없는 비행의 한계에 도전하라.</p>
      </div>
    </div>
  </div>
</body>
</html>
