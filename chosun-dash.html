<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Chosun Dash — Rhythm runner through cursed Korean temples. Dodge obstacles as a Dokkebi spirit cube. A BLIPZONES original.">
  <meta name="keywords" content="chosun dash, geometry dash, korean mythology, dokkebi, runner game, blipzones, browser game">
  <meta property="og:title" content="Chosun Dash | BLIPZONES">

  <title>Chosun Dash | BLIPZONES</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3097458973063020" crossorigin="anonymous"></script>

<body>
<canvas id="c"></canvas>
<div id="progress"></div>
<script>
// ============================================================
//  CHOSUN DASH  ·  BLIPZONES  ·  도깨비 런
//  Geometry Dash-style rhythm runner · Korean mythology theme
// ============================================================

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const prog   = document.getElementById('progress');

// ── RESIZE ──────────────────────────────────────────────────
let W, H, GROUND, CEILING;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND  = H * 0.80;
  CEILING = H * 0.08;
}
resize();
window.addEventListener('resize', () => { resize(); initBg(); });

// ── PALETTE ─────────────────────────────────────────────────
const P = {
  bg:         '#0a0c14',
  ground:     '#12172a',
  groundLine: '#1e2848',
  groundFar:  '#0e1220',
  player:     '#f0a500',
  playerDim:  '#8b5e00',
  ship:       '#00e5cc',
  shipDim:    '#006655',
  spike:      '#cc2244',
  block:      '#1a2850',
  blockTop:   '#2a3870',
  blockEdge:  '#3d569e',
  gold:       '#f0a500',
  crimson:    '#cc2244',
  jade:       '#00aa66',
  portal1:    '#aa44ff',
  portal2:    '#00ffcc',
  text:       '#e8e4d0',
  muted:      '#55596e',
  glow:       'rgba(240,165,0,0.35)',
  shipGlow:   'rgba(0,229,204,0.35)',
};

// ── CONSTANTS ───────────────────────────────────────────────
const PLAYER_SIZE  = 42;
const SPIKE_W      = 40;
const SPIKE_H      = 40;
const GRAVITY      = 0.58;
const JUMP_V       = -13.5;
const SHIP_THRUST  = -0.55;
const SHIP_DRAG    = 0.92;
const SPEED_INIT   = 6.5;
const SPEED_MAX    = 15;
const SPEED_RAMP   = 0.0010;
const LEVEL_LENGTH = 3000; // "distance units" to beat a level

// ── STATE ────────────────────────────────────────────────────
let phase = 'menu';  // menu | playing | dead | win
let gameSpeed, distance, deathCount, frameCount;
let inputHeld = false;
let particles = [], stars = [], bgLayers = [];
let obstacles = [], portals = [];
let nextSpawnX, spawnCooldown;
let screenShake = 0;
let highScore = +localStorage.getItem('chosunDashHS') || 0;
let lastPct = 0;

// ── PLAYER ───────────────────────────────────────────────────
const pl = {
  x: 0, y: 0, vy: 0,
  rot: 0,
  grounded: false,
  mode: 'cube', // cube | ship
  dead: false,
};

function plInit() {
  pl.x       = W * 0.20;
  pl.y       = GROUND - PLAYER_SIZE;
  pl.vy      = 0;
  pl.rot     = 0;
  pl.grounded= true;
  pl.dead    = false;
  pl.mode    = 'cube';
}

// ── AUDIO ────────────────────────────────────────────────────
let ac = null;
function initAudio() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq, type, dur, vol = 0.15) {
  if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.start(ac.currentTime);
  o.stop(ac.currentTime + dur + 0.01);
}

function sfxJump() {
  beep(420, 'square', 0.12, 0.12);
  setTimeout(() => beep(660, 'square', 0.08, 0.08), 60);
}
function sfxDeath() {
  beep(400, 'sawtooth', 0.15, 0.20);
  setTimeout(() => beep(250, 'sawtooth', 0.20, 0.18), 80);
  setTimeout(() => beep(120, 'sawtooth', 0.30, 0.15), 180);
}
function sfxPortal() {
  [440, 660, 880].forEach((f, i) => setTimeout(() => beep(f, 'sine', 0.18, 0.10), i * 60));
}
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 'sine', 0.25, 0.12), i * 100));
}

// ── STARS ────────────────────────────────────────────────────
function initStars() {
  stars = Array.from({ length: 180 }, () => ({
    x: Math.random() * W,
    y: Math.random() * GROUND * 0.85,
    r: Math.random() * 1.8 + 0.4,
    sp: Math.random() * 0.4 + 0.1,
    a: Math.random() * 0.7 + 0.3,
  }));
}

function drawStars() {
  stars.forEach(s => {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    if (phase === 'playing') {
      s.x -= s.sp * gameSpeed * 0.12;
      if (s.x < -5) s.x = W + 5;
    }
  });
  ctx.globalAlpha = 1;
}

// ── BACKGROUND LAYERS (mountains, pagodas) ───────────────────
function initBg() {
  bgLayers = [];
  // Far mountains (very dark)
  const mts1 = [];
  let mx = -100;
  while (mx < W + 400) {
    const mw = 180 + Math.random() * 260;
    const mh = 70 + Math.random() * 130;
    mts1.push({ x: mx, w: mw, h: mh });
    mx += mw * 0.65 + Math.random() * 40;
  }
  bgLayers.push({ type: 'mountains', pts: mts1, color: '#0e1122', speed: 0.6 });

  // Mid mountains
  const mts2 = [];
  mx = -80;
  while (mx < W + 300) {
    const mw = 120 + Math.random() * 180;
    const mh = 50 + Math.random() * 90;
    mts2.push({ x: mx, w: mw, h: mh });
    mx += mw * 0.55 + Math.random() * 30;
  }
  bgLayers.push({ type: 'mountains', pts: mts2, color: '#131826', speed: 1.3 });

  // Pagodas
  const pgs = [];
  let px = 100;
  while (px < W + 600) {
    pgs.push({ x: px, sc: 0.55 + Math.random() * 0.5 });
    px += 350 + Math.random() * 400;
  }
  bgLayers.push({ type: 'pagodas', pts: pgs, speed: 1.2 });
}

function drawPagoda(x, baseY, sc) {
  // Simple stylized pagoda silhouette
  const s = sc;
  ctx.fillStyle = '#0d111f';
  // Base
  ctx.fillRect(x - 22*s, baseY - 30*s, 44*s, 30*s);
  // Tiers (3 tiers, each narrower)
  const tiers = [
    { yw: 50*s, th: 20*s, rw: 36*s },
    { yw: 70*s, th: 20*s, rw: 28*s },
    { yw: 90*s, th: 18*s, rw: 20*s },
  ];
  tiers.forEach(t => {
    const ty = baseY - 30*s - t.yw;
    ctx.fillRect(x - t.rw, ty, t.rw*2, t.th);
    // eave overhang
    ctx.beginPath();
    ctx.moveTo(x - t.rw - 12*s, ty + t.th * 0.6);
    ctx.lineTo(x, ty - 4*s);
    ctx.lineTo(x + t.rw + 12*s, ty + t.th * 0.6);
    ctx.fill();
  });
  // Spire
  ctx.beginPath();
  ctx.moveTo(x, baseY - 30*s - 110*s - 22*s);
  ctx.lineTo(x - 3*s, baseY - 30*s - 110*s);
  ctx.lineTo(x + 3*s, baseY - 30*s - 110*s);
  ctx.fill();
}

function drawBg() {
  const spd = phase === 'playing' ? gameSpeed : 0;
  bgLayers.forEach(layer => {
    if (layer.type === 'mountains') {
      ctx.fillStyle = layer.color;
      layer.pts.forEach(m => {
        ctx.beginPath();
        ctx.moveTo(m.x, GROUND);
        ctx.lineTo(m.x + m.w * 0.5, GROUND - m.h);
        ctx.lineTo(m.x + m.w, GROUND);
        ctx.fill();
        if (spd > 0) m.x -= layer.speed * spd * 0.05;
      });
      // wrap
      layer.pts.forEach(m => {
        if (m.x + m.w < -20) m.x = W + Math.random() * 50;
      });
    } else if (layer.type === 'pagodas') {
      layer.pts.forEach(p => {
        drawPagoda(p.x, GROUND, p.sc);
        if (spd > 0) p.x -= layer.speed * spd * 0.05;
      });
      layer.pts.forEach(p => {
        if (p.x < -150) p.x = W + 100 + Math.random() * 200;
      });
    }
  });
}

// ── GROUND ───────────────────────────────────────────────────
function drawGround() {
  // Far ground
  ctx.fillStyle = P.groundFar;
  ctx.fillRect(0, GROUND + 1, W, H);

  // Ground top glow line
  const gg = ctx.createLinearGradient(0, GROUND - 2, 0, GROUND + 40);
  gg.addColorStop(0, 'rgba(30,40,72,0.9)');
  gg.addColorStop(1, 'rgba(10,12,20,1)');
  ctx.fillStyle = gg;
  ctx.fillRect(0, GROUND - 2, W, H);

  // Bright line at ground top
  ctx.strokeStyle = '#2a3870';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();

  // Grid lines on ground
  if (phase === 'playing') {
    ctx.strokeStyle = 'rgba(30,40,80,0.4)';
    ctx.lineWidth = 1;
    const spacing = 80;
    const offset = (distance * gameSpeed * 0.05) % spacing;
    for (let x = -offset; x < W + spacing; x += spacing) {
      ctx.beginPath();
      ctx.moveTo(x, GROUND);
      ctx.lineTo(x - 40, H);
      ctx.stroke();
    }
  }
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      size: 3 + Math.random() * 5,
      color,
    });
  }
}

function updateDrawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.2;
    p.life -= p.decay;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ── PLAYER TRAIL ─────────────────────────────────────────────
let trail = [];
function updateTrail() {
  if (phase !== 'playing' || pl.dead) return;
  trail.push({ x: pl.x, y: pl.y + PLAYER_SIZE / 2, life: 1 });
  if (trail.length > 14) trail.shift();
}

function drawTrail() {
  const col = pl.mode === 'ship' ? P.ship : P.player;
  trail.forEach((t, i) => {
    const a = (i / trail.length) * 0.3;
    ctx.globalAlpha = a;
    ctx.fillStyle = col;
    const s = PLAYER_SIZE * 0.3 * (i / trail.length);
    ctx.fillRect(t.x - s / 2, t.y - s / 2, s, s);
  });
  ctx.globalAlpha = 1;
}

// ── DRAW CUBE ────────────────────────────────────────────────
function drawCube(x, y, size, rot, glowColor, bodyColor) {
  ctx.save();
  ctx.translate(x + size / 2, y + size / 2);
  ctx.rotate(rot);

  // Glow
  const grd = ctx.createRadialGradient(0, 0, size * 0.1, 0, 0, size * 1.1);
  grd.addColorStop(0, glowColor);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(-size * 1.1, -size * 1.1, size * 2.2, size * 2.2);

  // Body
  ctx.fillStyle = '#0f141e';
  ctx.fillRect(-size / 2, -size / 2, size, size);

  // Border gradient
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 2.5;
  ctx.strokeRect(-size / 2, -size / 2, size, size);

  // Inner diamond pattern (dokkebi symbol)
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.35);
  ctx.lineTo(size * 0.35, 0);
  ctx.lineTo(0, size * 0.35);
  ctx.lineTo(-size * 0.35, 0);
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Eyes (two dots)
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(-size * 0.18, -size * 0.12, size * 0.07, 0, Math.PI * 2);
  ctx.arc( size * 0.18, -size * 0.12, size * 0.07, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── DRAW SHIP ────────────────────────────────────────────────
function drawShip(x, y, size, glowColor, bodyColor) {
  ctx.save();
  ctx.translate(x + size / 2, y + size / 2);

  // Glow
  const grd = ctx.createRadialGradient(0, 0, size * 0.1, 0, 0, size * 1.3);
  grd.addColorStop(0, glowColor);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(-size * 1.3, -size * 1.3, size * 2.6, size * 2.6);

  // Ship body (diamond/arrow shape)
  ctx.fillStyle = '#0f141e';
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo( size * 0.55, 0);
  ctx.lineTo( size * 0.1, -size * 0.42);
  ctx.lineTo(-size * 0.55, -size * 0.20);
  ctx.lineTo(-size * 0.55,  size * 0.20);
  ctx.lineTo( size * 0.1,  size * 0.42);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Engine trail
  ctx.fillStyle = bodyColor;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.moveTo(-size * 0.55, -size * 0.15);
  ctx.lineTo(-size * 0.85, 0);
  ctx.lineTo(-size * 0.55,  size * 0.15);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Core
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.12, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── OBSTACLES ────────────────────────────────────────────────
// Types: 'spike' | 'block' | 'cspike' | 'cblock'
// spike/block sit on ground; cspike/cblock hang from ceiling

function makeSpike(x) {
  return { type: 'spike', x, y: GROUND - SPIKE_H, w: SPIKE_W, h: SPIKE_H };
}
function makeBlock(x, h) {
  h = h || PLAYER_SIZE;
  return { type: 'block', x, y: GROUND - h, w: PLAYER_SIZE * 1.1, h };
}
function makeCSpike(x) {
  return { type: 'cspike', x, y: CEILING, w: SPIKE_W, h: SPIKE_H };
}
function makeCBlock(x, h) {
  h = h || PLAYER_SIZE;
  return { type: 'cblock', x, y: CEILING, w: PLAYER_SIZE * 1.1, h };
}
function makePortal(x, toMode) {
  return { type: 'portal', x, toMode, w: 40, h: GROUND - CEILING };
}

// Cube-mode patterns: arrays of offsets + type
const CUBE_PATTERNS = [
  // very easy
  () => [makeSpike(0)],
  () => [makeSpike(0), makeSpike(SPIKE_W + 4)],
  () => [makeBlock(0, PLAYER_SIZE)],
  // easy
  () => [makeSpike(0), makeSpike(SPIKE_W * 2 + 8)],
  () => [makeBlock(0, PLAYER_SIZE), makeSpike(PLAYER_SIZE * 2)],
  () => [makeBlock(0, PLAYER_SIZE * 2)],  // tall block
  () => [makeSpike(0), makeSpike(SPIKE_W + 4), makeSpike(SPIKE_W * 2 + 8)],
  // medium
  () => [makeBlock(0, PLAYER_SIZE), makeBlock(PLAYER_SIZE * 1.5, PLAYER_SIZE)],
  () => [makeSpike(0), makeBlock(PLAYER_SIZE * 2, PLAYER_SIZE * 2)],
  () => [makeCSpike(0)],
  // harder
  () => [makeCSpike(0), makeSpike(SPIKE_W + 30)],
  () => [makeBlock(0, PLAYER_SIZE), makeCSpike(PLAYER_SIZE * 1.8)],
  () => [makeSpike(0), makeCSpike(SPIKE_W * 2), makeSpike(SPIKE_W * 4)],
  // tricky
  () => [makeBlock(0, PLAYER_SIZE * 1.5), makeCSpike(PLAYER_SIZE * 2.5)],
  () => [makeSpike(0), makeSpike(SPIKE_W + 4), makeCSpike(SPIKE_W * 3.5), makeSpike(SPIKE_W * 5)],
];

// Ship-mode patterns
const SHIP_PATTERNS = [
  () => [makeBlock(0, PLAYER_SIZE * 1.5), makeCBlock(PLAYER_SIZE * 1.8, PLAYER_SIZE * 1.5)],
  () => [makeCBlock(0, PLAYER_SIZE * 2)],
  () => [makeBlock(0, PLAYER_SIZE * 2)],
  () => [makeCBlock(0, PLAYER_SIZE), makeBlock(PLAYER_SIZE * 2, PLAYER_SIZE)],
  () => [makeCBlock(0, PLAYER_SIZE * 2.5), makeBlock(PLAYER_SIZE * 3, PLAYER_SIZE)],
];

let difficulty = 0; // 0..1 as game progresses

function getPattern() {
  const pool = pl.mode === 'ship' ? SHIP_PATTERNS : CUBE_PATTERNS;
  // Harder patterns at higher difficulty
  const maxIdx = Math.floor(1 + (pool.length - 1) * difficulty);
  const idx = Math.floor(Math.random() * maxIdx);
  return pool[idx]();
}

function spawnObstacles() {
  if (phase !== 'playing') return;
  if (distance < 60) return; // brief safe start

  if (nextSpawnX <= W + 100) {
    const gap = 220 + Math.random() * 220 - difficulty * 80;
    const spawnX = W + 80;

    // Occasional portal switch
    if (distance > 200 && Math.random() < 0.07) {
      const toMode = pl.mode === 'cube' ? 'ship' : 'cube';
      obstacles.push({ ...makePortal(spawnX, toMode), id: Date.now() });
      nextSpawnX = spawnX + 120;
      return;
    }

    const pattern = getPattern();
    pattern.forEach(obs => {
      obs.x += spawnX;
      obs.id = Date.now() + Math.random();
      obstacles.push(obs);
    });
    nextSpawnX = spawnX + gap;
  }
}

function drawSpikeTri(x, y, w, h, color, pointDown) {
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  if (!pointDown) {
    ctx.moveTo(x, y + h);
    ctx.lineTo(x + w / 2, y);
    ctx.lineTo(x + w, y + h);
  } else {
    ctx.moveTo(x, y);
    ctx.lineTo(x + w / 2, y + h);
    ctx.lineTo(x + w, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawObstacles() {
  obstacles.forEach(o => {
    if (o.type === 'spike' || o.type === 'cspike') {
      const pointDown = o.type === 'cspike';
      drawSpikeTri(o.x, o.y, o.w, o.h, P.crimson, pointDown);
    } else if (o.type === 'block' || o.type === 'cblock') {
      // Block body
      ctx.fillStyle = P.block;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // Top/bottom highlight
      ctx.fillStyle = P.blockTop;
      const hlH = 5;
      if (o.type === 'block')  ctx.fillRect(o.x, o.y, o.w, hlH);
      if (o.type === 'cblock') ctx.fillRect(o.x, o.y + o.h - hlH, o.w, hlH);
      // Edge
      ctx.strokeStyle = P.blockEdge;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      // Texture lines
      ctx.strokeStyle = 'rgba(42,56,112,0.5)';
      ctx.lineWidth = 1;
      for (let gx = o.x + 14; gx < o.x + o.w; gx += 14) {
        ctx.beginPath(); ctx.moveTo(gx, o.y); ctx.lineTo(gx, o.y + o.h); ctx.stroke();
      }
    } else if (o.type === 'portal') {
      const col = o.toMode === 'ship' ? P.portal2 : P.portal1;
      const col2 = o.toMode === 'ship' ? P.ship : P.player;
      // Portal frame
      ctx.strokeStyle = col;
      ctx.lineWidth = 3;
      ctx.shadowColor = col;
      ctx.shadowBlur = 15;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.shadowBlur = 0;
      // Inner fill
      ctx.fillStyle = col.replace(')', ', 0.12)').replace('rgb', 'rgba').replace('#', 'rgba(').replace(/^rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/, (m, r, g, b) =>
        `rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`);
      // simpler fill:
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = col;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.globalAlpha = 1;
      // Label
      ctx.fillStyle = col2;
      ctx.font = `bold ${Math.min(o.w * 0.45, 14)}px Outfit, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(o.toMode === 'ship' ? '✈' : '◆', o.x + o.w / 2, o.y + o.h / 2);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
    }
  });
}

function updateObstacles() {
  obstacles.forEach(o => { o.x -= gameSpeed; });
  obstacles = obstacles.filter(o => o.x + (o.w || 60) > -60);
}

// ── COLLISION ────────────────────────────────────────────────
// AABB vs AABB with shrunk hitbox for fairness
function checkCollision() {
  if (pl.dead) return;
  const margin = 5;
  const px = pl.x + margin, py = pl.y + margin;
  const pw = PLAYER_SIZE - margin * 2, ph = PLAYER_SIZE - margin * 2;

  for (const o of obstacles) {
    if (o.type === 'portal') {
      // Portal trigger (wide check)
      if (pl.x + PLAYER_SIZE > o.x && pl.x < o.x + o.w &&
          pl.y + PLAYER_SIZE > o.y && pl.y < o.y + o.h) {
        const prevMode = pl.mode;
        pl.mode = o.toMode;
        obstacles.splice(obstacles.indexOf(o), 1);
        if (pl.mode !== prevMode) sfxPortal();
        spawnParticles(pl.x + PLAYER_SIZE / 2, pl.y + PLAYER_SIZE / 2, pl.mode === 'ship' ? P.portal2 : P.portal1, 16);
      }
      continue;
    }

    if (o.type === 'spike' || o.type === 'cspike') {
      // Triangle collision (point-in-triangle for tip)
      // Simplified: AABB with smaller hit
      const sm = 8;
      const sx = o.x + sm, sy = o.y + (o.type === 'spike' ? sm : 0);
      const sw = o.w - sm * 2, sh = o.h - sm;
      if (px < sx + sw && px + pw > sx && py < sy + sh && py + ph > sy) {
        killPlayer();
        return;
      }
    } else if (o.type === 'block' || o.type === 'cblock') {
      if (px < o.x + o.w && px + pw > o.x && py < o.y + o.h && py + ph > o.y) {
        killPlayer();
        return;
      }
    }
  }
}

function killPlayer() {
  if (pl.dead) return;
  pl.dead = true;
  phase = 'dead';
  screenShake = 18;
  sfxDeath();
  spawnParticles(pl.x + PLAYER_SIZE / 2, pl.y + PLAYER_SIZE / 2, P.player, 20);
  spawnParticles(pl.x + PLAYER_SIZE / 2, pl.y + PLAYER_SIZE / 2, P.crimson, 12);
  deathCount++;
}

// ── PLAYER UPDATE ────────────────────────────────────────────
function updatePlayer() {
  if (phase !== 'playing') return;

  if (pl.mode === 'cube') {
    pl.vy += GRAVITY;
    pl.y  += pl.vy;

    // Ground collision
    if (pl.y >= GROUND - PLAYER_SIZE) {
      pl.y = GROUND - PLAYER_SIZE;
      pl.vy = 0;
      pl.grounded = true;
    } else {
      pl.grounded = false;
    }

    // Ceiling collision (kill)
    if (pl.y <= CEILING) {
      pl.y = CEILING;
      pl.vy = 0;
    }

    // Rotation
    if (pl.grounded) {
      pl.rot = Math.round(pl.rot / (Math.PI / 2)) * (Math.PI / 2);
    } else {
      pl.rot += 0.07;
    }
  } else {
    // Ship mode
    if (inputHeld) pl.vy += SHIP_THRUST;
    else           pl.vy += GRAVITY * 0.45;
    pl.vy *= SHIP_DRAG + 0.03;
    pl.vy = Math.max(-10, Math.min(10, pl.vy));
    pl.y += pl.vy;

    if (pl.y >= GROUND - PLAYER_SIZE) {
      pl.y = GROUND - PLAYER_SIZE;
      killPlayer();
      return;
    }
    if (pl.y <= CEILING) {
      pl.y = CEILING;
      killPlayer();
      return;
    }
    pl.rot = 0;
  }
}

// ── INPUT ────────────────────────────────────────────────────
function onAction() {
  initAudio();
  if (phase === 'menu') {
    startGame();
    return;
  }
  if (phase === 'dead' || phase === 'win') {
    restartGame();
    return;
  }
  if (phase === 'playing') {
    if (pl.mode === 'cube') {
      if (pl.grounded) {
        pl.vy = JUMP_V;
        pl.grounded = false;
        sfxJump();
        spawnParticles(pl.x + PLAYER_SIZE / 2, pl.y + PLAYER_SIZE, P.player, 5);
      }
    }
  }
}

function onActionUp() {}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (!inputHeld) onAction();
    inputHeld = true;
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    inputHeld = false;
    onActionUp();
  }
});
canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  inputHeld = true;
  onAction();
});
canvas.addEventListener('mouseup', () => { inputHeld = false; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  inputHeld = true;
  onAction();
}, { passive: false });
canvas.addEventListener('touchend', () => { inputHeld = false; });

// ── GAME FLOW ─────────────────────────────────────────────────
function startGame() {
  phase = 'playing';
  gameSpeed = SPEED_INIT;
  distance = 0;
  deathCount = 0;
  frameCount = 0;
  difficulty = 0;
  lastPct = 0;
  obstacles = [];
  particles = [];
  trail = [];
  nextSpawnX = W + 100;
  spawnCooldown = 0;
  plInit();
  initStars();
  initBg();
}

function restartGame() {
  startGame();
}

// ── HUD ───────────────────────────────────────────────────────
function drawHUD() {
  const pct = Math.min(100, Math.floor((distance / LEVEL_LENGTH) * 100));
  prog.style.width = pct + '%';

  // Score / distance %
  ctx.save();
  ctx.fillStyle = P.text;
  ctx.font = 'bold 18px Outfit, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(pct + '%', W - 20, 36);

  ctx.textAlign = 'left';
  ctx.font = '14px Outfit, sans-serif';
  ctx.fillStyle = P.muted;
  ctx.fillText('ATTEMPTS: ' + deathCount, 20, 36);

  // Mode badge
  const modeCol = pl.mode === 'ship' ? P.ship : P.gold;
  ctx.fillStyle = modeCol;
  ctx.font = 'bold 13px Outfit, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(pl.mode === 'ship' ? '✈ SHIP MODE' : '◆ CUBE MODE', W / 2, 32);

  // High score
  if (highScore > 0) {
    ctx.textAlign = 'right';
    ctx.font = '13px Outfit, sans-serif';
    ctx.fillStyle = P.muted;
    ctx.fillText('BEST: ' + highScore + '%', W - 20, 56);
  }

  ctx.restore();
}

// ── MENU SCREEN ───────────────────────────────────────────────
function drawMenu() {
  // Dim overlay
  ctx.fillStyle = 'rgba(10,12,20,0.65)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;

  // Title glow
  ctx.save();
  ctx.shadowColor = P.gold;
  ctx.shadowBlur = 30;
  ctx.fillStyle = P.gold;
  ctx.font = `bold ${Math.min(72, W * 0.11)}px Outfit, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('CHOSUN DASH', cx, cy - H * 0.14);
  ctx.shadowBlur = 0;

  // Korean subtitle
  ctx.fillStyle = P.muted;
  ctx.font = `${Math.min(22, W * 0.04)}px Outfit, sans-serif`;
  ctx.fillText('도깨비 런  ·  DOKKEBI RUNNER', cx, cy - H * 0.065);

  // Demo player
  drawCube(cx - PLAYER_SIZE / 2, cy - H * 0.01, PLAYER_SIZE, (Date.now() / 800) % (Math.PI * 2), P.glow, P.player);

  // Start prompt (pulsing)
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = P.text;
  ctx.font = `bold ${Math.min(22, W * 0.04)}px Outfit, sans-serif`;
  ctx.fillText('TAP / CLICK / SPACE  TO START', cx, cy + H * 0.17);
  ctx.globalAlpha = 1;

  // Controls info
  ctx.fillStyle = P.muted;
  ctx.font = `${Math.min(15, W * 0.028)}px Outfit, sans-serif`;
  ctx.fillText('CUBE MODE: tap to jump   ·   SHIP MODE: hold to fly up', cx, cy + H * 0.25);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = P.gold;
    ctx.font = `bold ${Math.min(16, W * 0.03)}px Outfit, sans-serif`;
    ctx.fillText('BEST: ' + highScore + '%', cx, cy + H * 0.32);
  }

  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── DEATH SCREEN ─────────────────────────────────────────────
function drawDeathScreen() {
  ctx.fillStyle = 'rgba(10,12,20,0.78)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = P.crimson;
  ctx.font = `bold ${Math.min(52, W * 0.085)}px Outfit, sans-serif`;
  ctx.shadowColor = P.crimson;
  ctx.shadowBlur = 20;
  ctx.fillText('귀신에 잡혔다!', cx, cy - H * 0.12);
  ctx.shadowBlur = 0;

  ctx.fillStyle = P.muted;
  ctx.font = `${Math.min(17, W * 0.032)}px Outfit, sans-serif`;
  ctx.fillText('YOU WERE CAUGHT BY THE GWISIN', cx, cy - H * 0.04);

  const pct = Math.min(100, Math.floor((distance / LEVEL_LENGTH) * 100));
  ctx.fillStyle = P.text;
  ctx.font = `bold ${Math.min(36, W * 0.06)}px Outfit, sans-serif`;
  ctx.fillText(pct + '%', cx, cy + H * 0.06);
  ctx.fillStyle = P.muted;
  ctx.font = `${Math.min(15, W * 0.026)}px Outfit, sans-serif`;
  ctx.fillText('COMPLETED  ·  ATTEMPT ' + deathCount, cx, cy + H * 0.13);

  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = P.gold;
  ctx.font = `bold ${Math.min(20, W * 0.035)}px Outfit, sans-serif`;
  ctx.fillText('TAP TO TRY AGAIN', cx, cy + H * 0.22);
  ctx.globalAlpha = 1;

  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── WIN SCREEN ────────────────────────────────────────────────
function drawWinScreen() {
  ctx.fillStyle = 'rgba(10,12,20,0.78)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Stars burst
  spawnParticles(cx, cy, P.gold, 3);
  spawnParticles(cx, cy, P.jade, 3);

  ctx.fillStyle = P.gold;
  ctx.shadowColor = P.gold;
  ctx.shadowBlur = 30;
  ctx.font = `bold ${Math.min(58, W * 0.09)}px Outfit, sans-serif`;
  ctx.fillText('정복!', cx, cy - H * 0.14);
  ctx.shadowBlur = 0;

  ctx.fillStyle = P.text;
  ctx.font = `${Math.min(22, W * 0.038)}px Outfit, sans-serif`;
  ctx.fillText('LEVEL COMPLETE!', cx, cy - H * 0.04);

  ctx.fillStyle = P.jade;
  ctx.font = `bold ${Math.min(30, W * 0.05)}px Outfit, sans-serif`;
  ctx.fillText('100%  ✦  ' + deathCount + (deathCount === 1 ? ' ATTEMPT' : ' ATTEMPTS'), cx, cy + H * 0.06);

  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = P.text;
  ctx.font = `bold ${Math.min(18, W * 0.032)}px Outfit, sans-serif`;
  ctx.fillText('TAP TO PLAY AGAIN', cx, cy + H * 0.20);
  ctx.globalAlpha = 1;

  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  // Screen shake
  let sx = 0, sy = 0;
  if (screenShake > 0) {
    sx = (Math.random() - 0.5) * screenShake;
    sy = (Math.random() - 0.5) * screenShake;
    screenShake *= 0.82;
    if (screenShake < 0.5) screenShake = 0;
  }
  ctx.setTransform(1, 0, 0, 1, sx, sy);

  // Clear
  ctx.fillStyle = P.bg;
  ctx.fillRect(-W, -H, W * 3, H * 3);

  // Draw background
  drawStars();
  drawBg();
  drawGround();

  if (phase === 'playing') {
    // Update
    gameSpeed  = Math.min(SPEED_MAX, SPEED_INIT + distance * SPEED_RAMP);
    distance  += gameSpeed * 0.016 * 60;
    difficulty = Math.min(1, distance / (LEVEL_LENGTH * 0.85));

    updatePlayer();
    spawnObstacles();
    updateObstacles();
    checkCollision();
    updateTrail();

    if (!pl.dead) {
      const pct = distance / LEVEL_LENGTH;
      if (pct >= 1) {
        phase = 'win';
        const finalPct = 100;
        if (finalPct > highScore) {
          highScore = finalPct;
          localStorage.setItem('chosunDashHS', highScore);
        }
        sfxWin();
        prog.style.width = '100%';
      }
    }

    // Draw
    drawTrail();
    drawObstacles();

    // Draw player
    if (!pl.dead) {
      if (pl.mode === 'cube') {
        drawCube(pl.x, pl.y, PLAYER_SIZE, pl.rot, P.glow, P.player);
      } else {
        drawShip(pl.x, pl.y, PLAYER_SIZE, P.shipGlow, P.ship);
      }
    }

    // Update best score
    const pct = Math.min(100, Math.floor((distance / LEVEL_LENGTH) * 100));
    if (pct > highScore && pct < 100) {
      highScore = pct;
      localStorage.setItem('chosunDashHS', highScore);
    }

    drawHUD();
  } else if (phase === 'dead') {
    drawTrail();
    drawObstacles();
    updateDrawParticles();
    drawDeathScreen();
  } else if (phase === 'win') {
    drawWinScreen();
  } else if (phase === 'menu') {
    drawMenu();
  }

  if (phase === 'playing') {
    updateDrawParticles();
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

// ── INIT ──────────────────────────────────────────────────────
initStars();
initBg();
loop();
</script>
