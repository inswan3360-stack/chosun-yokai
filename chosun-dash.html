// ── AUDIO ────────────────────────────────────────────────────
let ac=null;
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();}
function beep(f,t,d,v=0.14){
  if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
  o.start(ac.currentTime);o.stop(ac.currentTime+d+0.01);
}
function sfxJump(){beep(420,'square',0.12,0.12);setTimeout(()=>beep(660,'square',0.08,0.08),60);}
function sfxOrb(){beep(660,'sine',0.10,0.14);setTimeout(()=>beep(880,'sine',0.08,0.12),50);setTimeout(()=>beep(1100,'sine',0.06,0.10),100);}
function sfxDeath(){beep(400,'sawtooth',0.15,0.20);setTimeout(()=>beep(200,'sawtooth',0.25,0.16),100);}
function sfxPortal(){[440,660,880].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.18,0.10),i*60));}
function sfxClear(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.22,0.12),i*90));}

// ── HELPERS ──────────────────────────────────────────────────
function lvl(){return LEVELS[lvlIdx];}
function zone(){return ZONES[lvl()[2]];}
function lerp(a,b,t){return a+(b-a)*t;}

// ── STARS ────────────────────────────────────────────────────
function initStars(){
  stars=Array.from({length:160},()=>({
    x:Math.random()*W, y:Math.random()*GY*0.85,
    r:Math.random()*1.8+0.3, sp:Math.random()*0.4+0.1,
    a:Math.random()*0.7+0.3
  }));
}
function drawStars(){
  stars.forEach(s=>{
    ctx.globalAlpha=s.a;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    if(phase==='playing'){s.x-=s.sp*gameSpd*0.12;if(s.x<-5)s.x=W+5;}
  });
  ctx.globalAlpha=1;
}

// ── BACKGROUND ───────────────────────────────────────────────
function initBg(){
  bgLayers=[];
  const mts1=[],mts2=[],pgs=[];
  let mx=-100;
  while(mx<W+400){const mw=180+Math.random()*260,mh=70+Math.random()*130;mts1.push({x:mx,w:mw,h:mh});mx+=mw*0.65+Math.random()*40;}
  mx=-80;
  while(mx<W+300){const mw=120+Math.random()*180,mh=50+Math.random()*90;mts2.push({x:mx,w:mw,h:mh});mx+=mw*0.55+Math.random()*30;}
  let px=100;while(px<W+600){pgs.push({x:px,sc:0.55+Math.random()*0.5});px+=350+Math.random()*400;}
  bgLayers.push({type:'mts',pts:mts1,spd:0.6});
  bgLayers.push({type:'mts',pts:mts2,spd:1.3});
  bgLayers.push({type:'pgs',pts:pgs,spd:1.2});
}
function drawPagoda(x,by,sc){
  const s=sc;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(x-22*s,by-30*s,44*s,30*s);
  [{yw:50*s,th:20*s,rw:36*s},{yw:70*s,th:20*s,rw:28*s},{yw:90*s,th:18*s,rw:20*s}].forEach(t=>{
    const ty=by-30*s-t.yw;
    ctx.fillRect(x-t.rw,ty,t.rw*2,t.th);
    ctx.beginPath();ctx.moveTo(x-t.rw-12*s,ty+t.th*0.6);ctx.lineTo(x,ty-4*s);ctx.lineTo(x+t.rw+12*s,ty+t.th*0.6);ctx.fill();
  });
  ctx.beginPath();ctx.moveTo(x,by-160*s);ctx.lineTo(x-3*s,by-140*s);ctx.lineTo(x+3*s,by-140*s);ctx.fill();
}
function drawBg(){
  const z=zone();
  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,z.sky);sg.addColorStop(1,z.bg);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,GY);
  const spd=phase==='playing'?gameSpd:0;
  const zac=z.accent;
  bgLayers.forEach(l=>{
    if(l.type==='mts'){
      ctx.fillStyle='rgba(0,0,0,0.35)';
      l.pts.forEach(m=>{
        ctx.beginPath();ctx.moveTo(m.x,GY);ctx.lineTo(m.x+m.w*0.5,GY-m.h);ctx.lineTo(m.x+m.w,GY);ctx.fill();
        if(spd>0)m.x-=l.spd*spd*0.05;
      });
      l.pts.forEach(m=>{if(m.x+m.w<-20)m.x=W+Math.random()*50;});
    }else{
      l.pts.forEach(p=>{
        drawPagoda(p.x,GY,p.sc);
        if(spd>0)p.x-=l.spd*spd*0.05;
      });
      l.pts.forEach(p=>{if(p.x<-150)p.x=W+100+Math.random()*200;});
    }
  });
}
function drawGround(){
  const z=zone();
  const gg=ctx.createLinearGradient(0,GY-2,0,GY+50);
  gg.addColorStop(0,'rgba(30,40,72,0.9)');gg.addColorStop(1,'rgba(10,12,20,1)');
  ctx.fillStyle=gg;ctx.fillRect(0,GY-2,W,H);
  ctx.strokeStyle=z.gl;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();
  if(phase==='playing'){
    ctx.strokeStyle='rgba(30,40,80,0.3)';ctx.lineWidth=1;
    const sp=80,off=(dist*0.8)%sp;
    for(let x=-off;x<W+sp;x+=sp){ctx.beginPath();ctx.moveTo(x,GY);ctx.lineTo(x-40,H);ctx.stroke();}
  }
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnPfx(x,y,col,n=12){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2+Math.random()*0.5,sp=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,decay:0.03+Math.random()*0.04,size:3+Math.random()*5,col});
  }
}
function updatePfx(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=p.decay;ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);});
  ctx.globalAlpha=1;
}

function updateTrail(){
  if(phase!=='playing'||pl.dead)return;
  trail.push({x:pl.x,y:pl.y+PS/2});
  if(trail.length>16)trail.shift();
}
function drawTrail(){
  const col=pl.mode==='ship'?'#00e5cc':'#f0a500';
  trail.forEach((t,i)=>{
    ctx.globalAlpha=(i/trail.length)*0.28;ctx.fillStyle=col;
    const s=PS*0.28*(i/trail.length);ctx.fillRect(t.x-s/2,t.y-s/2,s,s);
  });
  ctx.globalAlpha=1;
}

// ── DRAW PLAYER ──────────────────────────────────────────────
function drawCube(x,y,sz,rot,gc,bc){
  ctx.save();ctx.translate(x+sz/2,y+sz/2);ctx.rotate(rot);
  const gr=ctx.createRadialGradient(0,0,sz*0.1,0,0,sz*1.1);
  gr.addColorStop(0,gc);gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.fillRect(-sz*1.1,-sz*1.1,sz*2.2,sz*2.2);
  ctx.fillStyle='#0f141e';ctx.fillRect(-sz/2,-sz/2,sz,sz);
  ctx.strokeStyle=bc;ctx.lineWidth=2.5;ctx.strokeRect(-sz/2,-sz/2,sz,sz);
  ctx.strokeStyle=bc;ctx.lineWidth=1.2;ctx.globalAlpha=0.55;
  ctx.beginPath();ctx.moveTo(0,-sz*0.35);ctx.lineTo(sz*0.35,0);ctx.lineTo(0,sz*0.35);ctx.lineTo(-sz*0.35,0);ctx.closePath();ctx.stroke();
  ctx.globalAlpha=1;ctx.fillStyle=bc;
  ctx.beginPath();ctx.arc(-sz*0.18,-sz*0.12,sz*0.07,0,Math.PI*2);ctx.arc(sz*0.18,-sz*0.12,sz*0.07,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawShip(x,y,sz,gc,bc){
  ctx.save();ctx.translate(x+sz/2,y+sz/2);
  const gr=ctx.createRadialGradient(0,0,sz*0.1,0,0,sz*1.3);
  gr.addColorStop(0,gc);gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.fillRect(-sz*1.3,-sz*1.3,sz*2.6,sz*2.6);
  ctx.fillStyle='#0f141e';ctx.strokeStyle=bc;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(sz*0.55,0);ctx.lineTo(sz*0.1,-sz*0.42);ctx.lineTo(-sz*0.55,-sz*0.20);ctx.lineTo(-sz*0.55,sz*0.20);ctx.lineTo(sz*0.1,sz*0.42);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle=bc;ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.moveTo(-sz*0.55,-sz*0.15);ctx.lineTo(-sz*0.85,0);ctx.lineTo(-sz*0.55,sz*0.15);ctx.fill();
  ctx.globalAlpha=1;ctx.fillStyle=bc;ctx.beginPath();ctx.arc(0,0,sz*0.12,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function getPat(mode,maxDiff){
  const pool=mode==='ship'?SPAT:CPAT;
  // Collect all tiers up to maxDiff
  const avail=[];
  for(let t=0;t<=Math.min(maxDiff,9);t++){
    if(pool[t])pool[t].forEach(p=>avail.push({tier:t,fn:p}));
  }
  if(!avail.length)return[mk.spike(0)];
  // Weight toward higher tiers
  const weights=avail.map(p=>1+p.tier*0.5);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<avail.length;i++){r-=weights[i];if(r<=0)return avail[i].fn();}
  return avail[avail.length-1].fn();
}

// ── SPAWN ────────────────────────────────────────────────────
function spawnObstacles(){
  if(phase!=='playing'||pl.dead)return;
  const lv=lvl();
  if(dist<60)return;
  if(nextSpawnX>W+100)return;

  const maxD=lv[5];
  const spawnX=W+80;
  // Ship section logic
  const frac=dist/lv[4];
  const shipStart=lv[6];
  const wantShip=shipStart!==null&&frac>=shipStart;
  if(wantShip!==false&&pl.mode==='cube'&&wantShip){
    obstacles.push({...mk.portal(spawnX,'ship'),id:Date.now()});
    nextSpawnX=spawnX+140;return;
  }
  if(shipStart!==null&&frac>=shipStart+0.38&&pl.mode==='ship'){
    obstacles.push({...mk.portal(spawnX,'cube'),id:Date.now()});
    nextSpawnX=spawnX+140;return;
  }

  const pat=getPat(pl.mode,maxD);
  pat.forEach(o=>{o.x+=spawnX;o.id=Date.now()+Math.random();obstacles.push(o);});

  const spd=gameSpd/BASE_SPD;
  const gap=Math.max(120, 240+Math.random()*200-maxD*15-spd*10);
  nextSpawnX=spawnX+gap;
}

// ── DRAW OBSTACLES ───────────────────────────────────────────
function drawSpike(x,y,w,h,col,dn){
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=7;
  ctx.beginPath();
  if(!dn){ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h);}
  else   {ctx.moveTo(x,y);  ctx.lineTo(x+w/2,y+h);ctx.lineTo(x+w,y);}
  ctx.closePath();ctx.fill();ctx.shadowBlur=0;
}
function drawObstacles(){
  const z=zone();
  obstacles.forEach(o=>{
    if(o.type==='spike'){
      drawSpike(o.x,o.y,o.w,o.h,'#cc2244',false);
    }else if(o.type==='cspike'){
      drawSpike(o.x,o.y,o.w,o.h,'#cc2244',true);
    }else if(o.type==='block'||o.type==='cblock'){
      ctx.fillStyle='#1a2850';ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle='#2a3870';
      if(o.type==='block')ctx.fillRect(o.x,o.y,o.w,5);
      else ctx.fillRect(o.x,o.y+o.h-5,o.w,5);
      ctx.strokeStyle='#3d569e';ctx.lineWidth=1.5;ctx.strokeRect(o.x,o.y,o.w,o.h);
      ctx.strokeStyle='rgba(42,56,112,0.4)';ctx.lineWidth=1;
      for(let gx=o.x+14;gx<o.x+o.w;gx+=14){ctx.beginPath();ctx.moveTo(gx,o.y);ctx.lineTo(gx,o.y+o.h);ctx.stroke();}
    }else if(o.type==='orb'){
      // Jump pad - glowing green circle with star
      ctx.shadowColor='#44ff88';ctx.shadowBlur=14;
      ctx.fillStyle='#44ff88';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffffff';ctx.font=`bold ${o.r*1.2}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',o.x,o.y);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.shadowBlur=0;
    }else if(o.type==='saw'){
      o.angle=(o.angle||0)+0.06;
      const r=o.r,cx=o.x,cy=o.y;
      ctx.save();ctx.translate(cx,cy);ctx.rotate(o.angle);
      ctx.shadowColor='#ff9900';ctx.shadowBlur=10;
      ctx.fillStyle='#cc5500';
      // Draw gear-like saw
      const teeth=8;
      ctx.beginPath();
      for(let i=0;i<teeth*2;i++){
        const a=(i/teeth)*Math.PI;
        const ri=i%2===0?r:r*0.65;
        i===0?ctx.moveTo(Math.cos(a)*ri,Math.sin(a)*ri):ctx.lineTo(Math.cos(a)*ri,Math.sin(a)*ri);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#330000';ctx.beginPath();ctx.arc(0,0,r*0.3,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    }else if(o.type==='portal'){
      const col=o.toMode==='ship'?'#00ffcc':'#aa44ff';
      ctx.strokeStyle=col;ctx.lineWidth=3;ctx.shadowColor=col;ctx.shadowBlur=16;
      ctx.strokeRect(o.x,o.y,o.w,o.h);ctx.shadowBlur=0;
      ctx.globalAlpha=0.14;ctx.fillStyle=col;ctx.fillRect(o.x,o.y,o.w,o.h);ctx.globalAlpha=1;
      ctx.fillStyle=o.toMode==='ship'?'#00e5cc':'#cc88ff';
      ctx.font=`bold 14px Outfit,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(o.toMode==='ship'?'✈':'◆',o.x+o.w/2,o.y+o.h/2);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
    }
  });
}

// ── UPDATE OBSTACLES ─────────────────────────────────────────
function updateObstacles(){
  obstacles.forEach(o=>o.x-=gameSpd);
  obstacles=obstacles.filter(o=>o.x+(o.w||o.r*2||60)>-80);
}

// ── COLLISION ────────────────────────────────────────────────
function checkCollision(){
  if(pl.dead)return;
  const m=5, px=pl.x+m, py=pl.y+m, pw=PS-m*2, ph=PS-m*2;
  for(const o of obstacles){
    if(o.type==='portal'){
      if(pl.x+PS>o.x&&pl.x<o.x+o.w&&pl.y+PS>o.y&&pl.y<o.y+o.h){
        const prev=pl.mode; pl.mode=o.toMode;
        obstacles.splice(obstacles.indexOf(o),1);
        if(pl.mode!==prev){sfxPortal();spawnPfx(pl.x+PS/2,pl.y+PS/2,pl.mode==='ship'?'#00ffcc':'#aa44ff',16);}
      }
      continue;
    }
    if(o.type==='orb'){
      if(Math.hypot(pl.x+PS/2-o.x,pl.y+PS/2-o.y)<o.r+PS*0.45){
        pl.vy=ORB_V; pl.grounded=false;
        sfxOrb(); spawnPfx(o.x,o.y,'#44ff88',10);
        obstacles.splice(obstacles.indexOf(o),1);
      }
      continue;
    }
    if(o.type==='spike'||o.type==='cspike'){
      const sm=8,sx=o.x+sm,sy=o.y+(o.type==='spike'?sm:0),sw=o.w-sm*2,sh=o.h-sm;
      if(px<sx+sw&&px+pw>sx&&py<sy+sh&&py+ph>sy){killPlayer();return;}
    }else if(o.type==='block'||o.type==='cblock'){
      if(px<o.x+o.w&&px+pw>o.x&&py<o.y+o.h&&py+ph>o.y){killPlayer();return;}
    }else if(o.type==='saw'){
      if(Math.hypot(pl.x+PS/2-o.x,pl.y+PS/2-o.y)<o.r+PS*0.38){killPlayer();return;}
    }
  }
}

// ── KILL / LEVEL CLEAR ───────────────────────────────────────
function killPlayer(){
  if(pl.dead)return;
  pl.dead=true; phase='dead'; screenShake=18; sfxDeath();
  spawnPfx(pl.x+PS/2,pl.y+PS/2,'#f0a500',20);
  spawnPfx(pl.x+PS/2,pl.y+PS/2,'#cc2244',12);
  attempts++;
  const pct=Math.min(99,Math.floor((dist/lvl()[4])*100));
  const pr=progress[lvlIdx]||{done:false,best:0,tries:0};
  pr.tries++; pr.best=Math.max(pr.best,pct);
  progress[lvlIdx]=pr; saveProgress();
}

function onLevelClear(){
  phase='clear'; sfxClear();
  spawnPfx(W/2,H/2,'#f0a500',30); spawnPfx(W/2,H/2,'#00aa66',20);
  const pr=progress[lvlIdx]||{done:false,best:0,tries:0};
  pr.done=true; pr.best=100; pr.tries=(pr.tries||0)+attempts;
  progress[lvlIdx]=pr;
  if(lvlIdx+1<LEVELS.length&&!progress[lvlIdx+1]){
    progress[lvlIdx+1]=progress[lvlIdx+1]||{done:false,best:0,tries:0};
  }
  saveProgress();
}

function saveProgress(){localStorage.setItem('chosunDash_v2',JSON.stringify(progress));}

// ── PLAYER PHYSICS ────────────────────────────────────────────
function updatePlayer(){
  if(phase!=='playing')return;
  if(pl.mode==='cube'){
    pl.vy+=GRAV; pl.y+=pl.vy;
    if(pl.y>=GY-PS){pl.y=GY-PS;pl.vy=0;pl.grounded=true;}
    else pl.grounded=false;
    if(pl.y<=CY){pl.y=CY;pl.vy=0;}
    pl.rot=pl.grounded?Math.round(pl.rot/(Math.PI/2))*(Math.PI/2):pl.rot+0.07;
  }else{
    if(inputHeld)pl.vy+=SHP_THR;
    else pl.vy+=GRAV*0.45;
    pl.vy*=SHP_DRG+0.02;
    pl.vy=Math.max(-10,Math.min(10,pl.vy));
    pl.y+=pl.vy;
    if(pl.y>=GY-PS){killPlayer();return;}
    if(pl.y<=CY){killPlayer();return;}
    pl.rot=0;
  }
}

// ── INPUT ────────────────────────────────────────────────────
function onPress(){
  initAudio();
  if(phase==='menu'){phase='select';return;}
  if(phase==='select')return; // handled by click coords
  if(phase==='banner'){startLevel();return;}
  if(phase==='dead'){restartLevel();return;}
  if(phase==='clear'){
    if(lvlIdx<99){lvlIdx++;openBanner();}
    else{phase='select';}
    return;
  }
  if(phase==='playing'&&pl.mode==='cube'&&pl.grounded){
    pl.vy=JUMP_V; pl.grounded=false; sfxJump();
    spawnPfx(pl.x+PS/2,pl.y+PS,'#f0a500',5);
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){
    e.preventDefault();if(!inputHeld)onPress();inputHeld=true;
  }
  if(e.code==='Escape'&&phase==='playing'){phase='dead';killPlayer();}
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')inputHeld=false;
});
canvas.addEventListener('mousedown',e=>{
  e.preventDefault();inputHeld=true;
  handleTap(e.clientX,e.clientY);
});
canvas.addEventListener('mouseup',()=>{inputHeld=false;});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();inputHeld=true;
  handleTap(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
canvas.addEventListener('touchend',()=>{inputHeld=false;});

// ── TAP HANDLING (level select grid) ─────────────────────────
function handleTap(mx,my){
  if(phase==='select'){
    const {gx,gy,cw,ch}=gridLayout();
    for(let i=0;i<100;i++){
      const col=i%10,row=Math.floor(i/10);
      const bx=gx+col*(cw+4),by=gy+row*(ch+4);
      if(mx>=bx&&mx<=bx+cw&&my>=by&&my<=by+ch){
        if(isUnlocked(i)){lvlIdx=i;openBanner();}
        return;
      }
    }
    // Back button
    if(mx>=W/2-60&&mx<=W/2+60&&my>=H-60&&my<=H-20){phase='menu';}
    return;
  }
  onPress();
}

// ── UNLOCK LOGIC ─────────────────────────────────────────────
function isUnlocked(idx){
  if(idx===0)return true;
  return !!(progress[idx-1]&&progress[idx-1].done);
}

// ── GAME FLOW ─────────────────────────────────────────────────
function openBanner(){
  phase='banner';bannerTimer=120; // ~2s at 60fps
  obstacles=[];particles=[];trail=[];
}
function startLevel(){
  const lv=lvl();
  phase='playing';
  gameSpd=BASE_SPD*lv[3];
  dist=0; attempts=1; frameN=0; difficulty=0;
  obstacles=[]; particles=[]; trail=[];
  nextSpawnX=W+100;
  plInit(); initStars(); initBg();
}
function restartLevel(){
  const lv=lvl();
  gameSpd=BASE_SPD*lv[3];
  dist=0; frameN=0; difficulty=0;
  obstacles=[];particles=[];trail=[];
  nextSpawnX=W+100;
  plInit(); attempts++;
  phase='playing';
}

// ── GRID LAYOUT ──────────────────────────────────────────────
function gridLayout(){
  const cols=10,rows=10;
  const padX=Math.min(40,W*0.04);
  const padY=120;
  const availW=W-padX*2,availH=H-padY-80;
  const cw=Math.floor(availW/cols)-4;
  const ch=Math.floor(availH/rows)-4;
  const gx=padX,gy=padY;
  return{gx,gy,cw:Math.max(cw,28),ch:Math.max(ch,22),cols,rows};
}

// ── DRAW: LEVEL SELECT ────────────────────────────────────────
function drawSelect(){
  ctx.fillStyle='rgba(10,12,20,0.94)';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';

  // Title
  ctx.fillStyle='#f0a500';ctx.font=`bold ${Math.min(32,W*0.055)}px Outfit,sans-serif`;
  ctx.fillText('SELECT LEVEL  ·  레벨 선택',W/2,48);
  ctx.fillStyle='#55596e';ctx.font=`${Math.min(14,W*0.025)}px Outfit,sans-serif`;
  ctx.fillText('Complete each level to unlock the next',W/2,76);

  const{gx,gy,cw,ch}=gridLayout();
  for(let i=0;i<100;i++){
    const col=i%10,row=Math.floor(i/10);
    const bx=gx+col*(cw+4),by=gy+row*(ch+4);
    const lv=LEVELS[i],z=ZONES[lv[2]];
    const unlocked=isUnlocked(i);
    const pr=progress[i];
    const done=pr&&pr.done;
    const started=pr&&pr.best>0;

    // Zone color bg
    if(unlocked){
      const alpha=done?0.8:0.5;
      ctx.globalAlpha=alpha;
      const grad=ctx.createLinearGradient(bx,by,bx+cw,by+ch);
      grad.addColorStop(0,z.bg);
      grad.addColorStop(1,hexAdd(z.bg,12));
      ctx.fillStyle=grad;
    }else{
      ctx.globalAlpha=0.3;ctx.fillStyle='#0a0c14';
    }
    ctx.fillRect(bx,by,cw,ch);
    ctx.globalAlpha=1;

    // Border
    ctx.strokeStyle=done?z.accent:(unlocked?(started?'#55596e':'#2a3040'):'#1a1e28');
    ctx.lineWidth=done?1.5:1;
    if(done){ctx.shadowColor=z.accent;ctx.shadowBlur=6;}
    ctx.strokeRect(bx,by,cw,ch);
    ctx.shadowBlur=0;

    // Number
    ctx.fillStyle=done?z.accent:(unlocked?'#e8e4d0':'#2a3040');
    ctx.font=`${done?'bold ':''  }${Math.min(12,ch*0.45)}px Outfit,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(!unlocked){ctx.fillText('🔒',bx+cw/2,by+ch/2);}
    else{ctx.fillText(i+1,bx+cw/2,by+ch/2);}

    // Done star
    if(done){
      ctx.fillStyle=z.accent;ctx.font=`${Math.min(9,ch*0.3)}px sans-serif`;
      ctx.fillText('★',bx+cw-8,by+8);
    }
  }
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Zone legend
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#2a3040';ctx.font=`${Math.min(12,W*0.018)}px Outfit,sans-serif`;
  ZONES.forEach((z,i)=>{
    const col=i%10,bx=gx+col*(cw+4);
    ctx.fillStyle=z.accent;ctx.fillText(z.kor,bx+cw/2,gy-20);
  });

  // Back button
  ctx.globalAlpha=0.7;
  ctx.fillStyle='#1a2030';ctx.fillRect(W/2-60,H-60,120,36);
  ctx.strokeStyle='#2a3040';ctx.lineWidth=1;ctx.strokeRect(W/2-60,H-60,120,36);
  ctx.fillStyle='#e8e4d0';ctx.font=`bold 13px Outfit,sans-serif`;
  ctx.fillText('← BACK',W/2,H-42);
  ctx.globalAlpha=1;
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.restore();
}

function hexAdd(hex,n){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const clamp=v=>Math.min(255,Math.max(0,v));
  return`#${clamp(r+n).toString(16).padStart(2,'0')}${clamp(g+n).toString(16).padStart(2,'0')}${clamp(b+n).toString(16).padStart(2,'0')}`;
}

// ── DRAW: MENU ────────────────────────────────────────────────
function drawMenu(){
  ctx.fillStyle='rgba(10,12,20,0.65)';ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#f0a500';ctx.shadowBlur=30;ctx.fillStyle='#f0a500';
  ctx.font=`bold ${Math.min(72,W*0.11)}px Outfit,sans-serif`;ctx.fillText('CHOSUN DASH',cx,cy-H*0.14);
  ctx.shadowBlur=0;
  ctx.fillStyle='#55596e';ctx.font=`${Math.min(20,W*0.035)}px Outfit,sans-serif`;
  ctx.fillText('도깨비 런  ·  100 LEVELS',cx,cy-H*0.064);
  drawCube(cx-PS/2,cy-H*0.01,PS,(Date.now()/800)%(Math.PI*2),'rgba(240,165,0,0.35)','#f0a500');
  const pulse=0.6+0.4*Math.sin(Date.now()/400);
  ctx.globalAlpha=pulse;ctx.fillStyle='#e8e4d0';ctx.font=`bold ${Math.min(22,W*0.038)}px Outfit,sans-serif`;
  ctx.fillText('TAP / SPACE TO ENTER',cx,cy+H*0.17);ctx.globalAlpha=1;
  ctx.fillStyle='#55596e';ctx.font=`${Math.min(14,W*0.025)}px Outfit,sans-serif`;
  ctx.fillText('CUBE MODE: tap to jump  ·  SHIP MODE: hold to fly',cx,cy+H*0.245);
  // best score
  const done=Object.values(progress).filter(p=>p.done).length;
  if(done>0){ctx.fillStyle='#f0a500';ctx.font=`bold ${Math.min(15,W*0.026)}px Outfit,sans-serif`;ctx.fillText(`${done}/100 LEVELS CLEARED`,cx,cy+H*0.32);}
  ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
}

// ── DRAW: LEVEL BANNER ────────────────────────────────────────
function drawBanner(){
  const lv=lvl(),z=zone();
  const t=1-bannerTimer/120;
  ctx.fillStyle=`rgba(10,12,20,${Math.min(0.85,t*2)})`;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  const cx=W/2,cy=H/2;
  const slide=Math.max(0,(t-0.1)*1.2);
  const yt=cy-H*0.12+H*0.05*(1-Math.min(1,slide*2));
  ctx.shadowColor=z.accent;ctx.shadowBlur=25;ctx.fillStyle=z.accent;
  ctx.font=`bold ${Math.min(18,W*0.03)}px Outfit,sans-serif`;
  ctx.fillText(`LEVEL ${lvlIdx+1}  ·  ZONE ${lv[2]+1}  ·  ${z.kor}`,cx,yt-40);
  ctx.shadowBlur=0;ctx.fillStyle='#e8e4d0';
  ctx.font=`bold ${Math.min(52,W*0.08)}px Outfit,sans-serif`;
  ctx.fillText(lv[0],cx,yt);
  ctx.fillStyle=z.accent;ctx.font=`${Math.min(24,W*0.04)}px Outfit,sans-serif`;
  ctx.fillText(lv[1],cx,yt+50);
  ctx.fillStyle='#55596e';ctx.font=`${Math.min(14,W*0.024)}px Outfit,sans-serif`;
  ctx.fillText('TAP OR PRESS SPACE TO START',cx,cy+H*0.22);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
}

// ── DRAW: HUD ────────────────────────────────────────────────
function drawHUD(){
  const pct=Math.min(100,Math.floor((dist/lvl()[4])*100));
  progEl.style.width=pct+'%';
  const z=zone();
  ctx.save();
  ctx.fillStyle='#e8e4d0';ctx.font=`bold 16px Outfit,sans-serif`;ctx.textAlign='right';
  ctx.fillText(pct+'%',W-18,34);
  ctx.textAlign='left';ctx.fillStyle='#55596e';ctx.font=`13px Outfit,sans-serif`;
  ctx.fillText(`LV${lvlIdx+1}  ATT:${attempts}`,18,34);
  ctx.fillStyle=pl.mode==='ship'?'#00e5cc':'#f0a500';
  ctx.font=`bold 12px Outfit,sans-serif`;ctx.textAlign='center';
  ctx.fillText(pl.mode==='ship'?'✈ SHIP':'◆ CUBE',W/2,30);
  ctx.textAlign='left';ctx.restore();
}

// ── DRAW: DEATH ───────────────────────────────────────────────
function drawDead(){
  ctx.fillStyle='rgba(10,12,20,0.80)';ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#cc2244';ctx.shadowBlur=20;ctx.fillStyle='#cc2244';
  ctx.font=`bold ${Math.min(50,W*0.08)}px Outfit,sans-serif`;ctx.fillText('귀신에 잡혔다!',cx,cy-H*0.12);
  ctx.shadowBlur=0;
  const pct=Math.min(100,Math.floor((dist/lvl()[4])*100));
  ctx.fillStyle='#e8e4d0';ctx.font=`bold ${Math.min(42,W*0.07)}px Outfit,sans-serif`;ctx.fillText(pct+'%',cx,cy+H*0.04);
  ctx.fillStyle='#55596e';ctx.font=`${Math.min(14,W*0.025)}px Outfit,sans-serif`;
  ctx.fillText(`ATTEMPT ${attempts}  ·  LV${lvlIdx+1} ${lvl()[0]}`,cx,cy+H*0.12);
  const pulse=0.6+0.4*Math.sin(Date.now()/400);
  ctx.globalAlpha=pulse;ctx.fillStyle='#f0a500';ctx.font=`bold ${Math.min(19,W*0.033)}px Outfit,sans-serif`;
  ctx.fillText('TAP TO RETRY',cx,cy+H*0.22);ctx.globalAlpha=0.55;
  ctx.fillStyle='#e8e4d0';ctx.font=`${Math.min(14,W*0.025)}px Outfit,sans-serif`;
  ctx.fillText('(ESC = back to select)',cx,cy+H*0.30);ctx.globalAlpha=1;
  ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
}
document.addEventListener('keydown',e=>{if(e.code==='Escape'&&phase==='dead'){phase='select';}});

// ── DRAW: LEVEL CLEAR ────────────────────────────────────────
function drawClear(){
  const z=zone();
  ctx.fillStyle='rgba(10,12,20,0.82)';ctx.fillRect(0,0,W,H);
  spawnPfx(Math.random()*W,Math.random()*H*0.5,z.accent,2);
  const cx=W/2,cy=H/2;
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=z.accent;ctx.shadowBlur=28;ctx.fillStyle=z.accent;
  ctx.font=`bold ${Math.min(60,W*0.095)}px Outfit,sans-serif`;ctx.fillText('정복!',cx,cy-H*0.14);
  ctx.shadowBlur=0;ctx.fillStyle='#e8e4d0';ctx.font=`${Math.min(22,W*0.038)}px Outfit,sans-serif`;
  ctx.fillText(`LV${lvlIdx+1} COMPLETE  ·  ${lvl()[0]}`,cx,cy-H*0.04);
  ctx.fillStyle=z.accent;ctx.font=`bold ${Math.min(28,W*0.048)}px Outfit,sans-serif`;
  ctx.fillText(`100%  ✦  ${attempts} ATTEMPT${attempts===1?'':'S'}`,cx,cy+H*0.06);
  const pulse=0.6+0.4*Math.sin(Date.now()/400);
  ctx.globalAlpha=pulse;ctx.fillStyle='#e8e4d0';ctx.font=`bold ${Math.min(18,W*0.032)}px Outfit,sans-serif`;
  ctx.fillText(lvlIdx<99?'TAP FOR NEXT LEVEL':'🎉 ALL 100 LEVELS CLEARED!',cx,cy+H*0.22);ctx.globalAlpha=1;
  ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  frameN++;
  let sx=0,sy=0;
  if(screenShake>0){sx=(Math.random()-0.5)*screenShake;sy=(Math.random()-0.5)*screenShake;screenShake*=0.82;if(screenShake<0.5)screenShake=0;}
  ctx.setTransform(1,0,0,1,sx,sy);

  // BG
  drawBg();
  drawStars();
  drawGround();

  if(phase==='playing'){
    const lv=lvl();
    const targetSpd=Math.min(MAX_SPD,BASE_SPD*lv[3]*(1+dist/(lv[4]*1.5)*0.3));
    gameSpd+=(targetSpd-gameSpd)*0.005;
    dist+=gameSpd*0.016*60;
    difficulty=Math.min(1,dist/(lv[4]*0.85));

    updatePlayer();
    spawnObstacles();
    updateObstacles();
    checkCollision();
    updateTrail();

    if(!pl.dead&&dist>=lv[4])onLevelClear();

    drawTrail();
    drawObstacles();
    updatePfx();

    if(!pl.dead){
      if(pl.mode==='cube')drawCube(pl.x,pl.y,PS,pl.rot,'rgba(240,165,0,0.35)','#f0a500');
      else drawShip(pl.x,pl.y,PS,'rgba(0,229,204,0.35)','#00e5cc');
    }
    drawHUD();

  }else if(phase==='dead'){
    drawTrail();drawObstacles();updatePfx();drawDead();
  }else if(phase==='clear'){
    updatePfx();drawClear();
  }else if(phase==='menu'){
    drawMenu();
  }else if(phase==='select'){
    drawSelect();
  }else if(phase==='banner'){
    bannerTimer--;
    if(bannerTimer<=0)startLevel();
    drawBanner();
  }

  ctx.setTransform(1,0,0,1,0,0);
}

// ── INIT ──────────────────────────────────────────────────────
// Unlock first level
if(!progress[0])progress[0]={done:false,best:0,tries:0};
initStars(); initBg(); loop();
</script>
