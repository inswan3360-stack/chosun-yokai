<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議곗꽑 ?붽눼 ?꾩깮湲?/title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a0a00;
      --paper: #f5e6c4;
      --dpaper: #e8d09a;
      --red: #9e1c0c;
      --gold: #c8900a;
      --jade: #1a5c38;
      --border: #7a4820;
      --night: #07080e;
      --muted: #7a5830;
    }

    body {
      background: #1a1008;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 10px 0;
      font-family: 'Noto Sans KR', sans-serif;
    }

    #app {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* ?? TITLE ?? */
    /* ?먥븧?먥븧?먥븧?먥븧 TITLE SCREEN ?먥븧?먥븧?먥븧?먥븧 */
    #titleScreen {
      background: #0c0e08;
      border: 2px solid #5a3a10;
      overflow: hidden;
    }
    #titleCv {
      display: block; width: 100%;
      image-rendering: pixelated; cursor: pointer;
    }

    /* ?? ?섎떒 UI ?⑤꼸: 議곗꽑 ?쒖?+癒?遺꾩쐞湲??? */
    .title-ui {
      background: linear-gradient(180deg, #1a1408 0%, #100e08 100%);
      border-top: 2px solid #4a2e0a;
      padding: 14px 16px 20px;
      position: relative;
    }
    /* ?곷떒 誘몄꽭 ?μ떇 以?*/
    .title-ui::before {
      content: '';
      position: absolute; top: 4px; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,144,10,0.3), transparent);
    }

    /* ?? ?쇱쿂 ?쒓렇: 2횞2 洹몃━?? ?덈퉬 苑?梨꾩? ?? */
    .title-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 14px;
    }
    .title-feat-tag {
      display: flex; align-items: center; gap: 8px;
      background: rgba(200,144,10,0.06);
      border: 1px solid rgba(200,144,10,0.22);
      border-radius: 4px;
      padding: 9px 12px;
      transition: all 0.15s;
      width: 100%;
    }
    .title-feat-tag:hover {
      background: rgba(200,144,10,0.12);
      border-color: rgba(200,144,10,0.42);
    }
    .title-feat-tag-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
    .title-feat-tag-txt {
      font-size: 12px; font-weight: 700;
      color: #b09050; letter-spacing: 0.3px;
    }

    /* ?? 踰꾪듉 ?? */
    .title-btns { display: flex; flex-direction: column; gap: 8px; }

    .title-btn {
      width: 100%; border-radius: 6px;
      padding: 14px 18px;
      font-size: 16px; font-weight: 900;
      cursor: pointer; font-family: inherit;
      letter-spacing: 1.5px;
      transition: all 0.15s cubic-bezier(.4,0,.2,1);
      position: relative; overflow: hidden;
    }

    /* 硫붿씤 踰꾪듉: ?꾪넻 二쇳솉+湲?*/
    .title-btn.main {
      background: linear-gradient(180deg, #c03010 0%, #8a1c08 100%);
      color: #f8d060;
      border: 2px solid #7a2008;
      box-shadow:
        0 3px 0 #3a0e02,
        0 5px 16px rgba(160,40,10,0.4),
        inset 0 1px 0 rgba(255,200,100,0.2);
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .title-btn.main::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,240,160,0.12), transparent);
      transition: left 0.5s;
    }
    .title-btn.main:hover::after { left: 150%; }
    .title-btn.main:hover {
      background: linear-gradient(180deg, #e03818 0%, #a02410 100%);
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #3a0e02, 0 8px 22px rgba(160,40,10,0.5);
    }
    .title-btn.main:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #3a0e02, 0 2px 8px rgba(160,40,10,0.3);
    }

    /* 蹂댁“ 踰꾪듉: 臾듭깋 */
    .title-btn.secondary {
      background: rgba(255,255,255,0.03);
      color: #7a6040; font-size: 14px; font-weight: 700;
      border: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 0.8px;
    }
    .title-btn.secondary:hover {
      background: rgba(200,144,10,0.08);
      color: #a08050;
      border-color: rgba(200,144,10,0.25);
      transform: translateY(-1px);
    }
    .title-btn.secondary:active { transform: translateY(0); }

    /* ?댁뼱?섍린 */
    #continueBtn {
      background: rgba(200,144,10,0.08) !important;
      color: #c8900a !important;
      border: 1px solid rgba(200,144,10,0.3) !important;
      font-size: 14px; font-weight: 700; letter-spacing: 0.8px;
    }
    #continueBtn:hover {
      background: rgba(200,144,10,0.15) !important;
      color: #e8b030 !important;
      border-color: rgba(200,144,10,0.5) !important;
    }

    /* ?? ?뚯븙 而⑦듃濡??? */
    .music-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px; padding: 7px 12px;
    }
    .music-btn {
      background: rgba(60,100,40,0.2); color: #608040;
      border: 1px solid rgba(60,100,40,0.3);
      padding: 4px 11px; font-size: 12px;
      cursor: pointer; font-family: inherit; font-weight: 700;
      border-radius: 4px; transition: 0.14s; white-space: nowrap;
    }
    .music-btn.on  { color: #80c050; border-color: rgba(60,120,40,0.5); }
    .music-btn:hover { background: rgba(60,100,40,0.35); }
    .vol-row { flex: 1; display: flex; align-items: center; gap: 8px; }
    .vol-lbl { color: #4a5838; font-size: 11px; font-weight: 700; }
    #volSlider { flex: 1; height: 3px; accent-color: #80c040; cursor: pointer; }
    #volNum { color: #5a7040; font-size: 11px; min-width: 26px; }
    .song-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
    .song-btn {
      background: rgba(0,0,0,0.2); color: #4a5838;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 4px 9px; font-size: 11px;
      cursor: pointer; font-family: inherit; font-weight: 700;
      border-radius: 4px; transition: 0.12s;
    }
    .song-btn.act { color: #80c050; border-color: rgba(60,120,40,0.4); background: rgba(60,100,40,0.15); }
    .song-btn:hover { color: #a0d070; border-color: rgba(60,120,40,0.35); }

    /* ?먥븧?먥븧?먥븧?먥븧 QUIZ SCREEN ?먥븧?먥븧?먥븧?먥븧 */
    #quizScreen { background: #0e1018; border: 2px solid rgba(200,144,10,0.35); }

    .quiz-head {
      background: #0c0e14;
      padding: 14px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .quiz-progress-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .quiz-num {
      font-size: 12px; font-weight: 700; color: #d4920e;
      background: rgba(200,144,10,0.1); border: 1px solid rgba(200,144,10,0.25);
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px;
    }
    .quiz-dim {
      font-size: 11px; color: #50607a; font-weight: 700;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.3px;
    }
    .quiz-pbg {
      height: 4px; background: rgba(255,255,255,0.07);
      border-radius: 10px; overflow: hidden;
    }
    .quiz-pfill {
      height: 100%;
      background: linear-gradient(90deg, #c8900a, #f0b830);
      border-radius: 10px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(200,144,10,0.5);
    }

    .quiz-scene {
      background: #13151e;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 16px 18px 14px;
    }
    .quiz-scene-lbl {
      font-size: 10px; font-weight: 700; color: #d4920e;
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .quiz-scene-lbl::after {
      content:''; flex:1; height:1px; background: rgba(200,144,10,0.2);
    }
    .quiz-scene-txt {
      font-size: 14px; color: #9aa0b0; line-height: 1.7;
    }

    .quiz-q-wrap { padding: 22px 18px 10px; }
    .quiz-q {
      font-family: 'Noto Serif KR', serif;
      font-size: 18px; font-weight: 700;
      color: #eef0f8; line-height: 1.75;
    }

    .quiz-opts {
      display: flex; flex-direction: column;
      gap: 8px; padding: 4px 18px 24px;
    }
    .quiz-opt {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px; padding: 13px 15px;
      cursor: pointer; font-size: 14px; font-family: inherit;
      color: #8090a0; text-align: left; line-height: 1.55;
      transition: all 0.16s cubic-bezier(.4,0,.2,1);
      display: flex; align-items: flex-start; gap: 11px;
    }
    .quiz-opt-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #505868;
      margin-top: 1px;
    }
    .quiz-opt-txt { flex: 1; }
    .quiz-opt:hover {
      background: rgba(200,144,10,0.07);
      border-color: rgba(200,144,10,0.32);
      color: #c8b880; transform: translateX(4px);
    }
    .quiz-opt:hover .quiz-opt-num {
      background: rgba(200,144,10,0.18);
      border-color: rgba(200,144,10,0.4); color: #d4920e;
    }
    .quiz-opt.sel {
      background: rgba(200,144,10,0.12);
      border-color: rgba(200,144,10,0.55);
      color: #e8d080; transform: translateX(4px);
      box-shadow: 0 2px 14px rgba(200,144,10,0.18);
    }
    .quiz-opt.sel .quiz-opt-num {
      background: #c8900a; border-color: #e8b030; color: #0c0a04; font-weight: 900;
    }

    /* ?? RESULT ?? */
    #resultScreen {
      background: var(--night);
      border: 3px solid var(--gold);
    }

    .result-head {
      background: var(--red);
      padding: 9px 13px;
      border-bottom: 3px solid var(--gold);
      text-align: center;
    }

    .result-head h2 {
      color: var(--gold);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .result-body {
      padding: 13px;
    }

    .result-row {
      display: flex;
      gap: 13px;
      align-items: center;
      background: #0d1520;
      border: 2px solid #1e3050;
      padding: 11px;
      margin-bottom: 9px;
    }

    .result-row canvas {
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .result-name {
      color: var(--gold);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-type {
      color: #5a8aaa;
      font-size: 13px;
      margin-bottom: 5px;
    }

    .result-desc {
      color: #b8c8d8;
      font-size: 14px;
      line-height: 1.65;
    }

    .mbti-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 9px;
    }

    .mbti-cell {
      background: #0d1520;
      border: 1px solid #1e3050;
      padding: 6px 8px;
    }

    .mbti-lbl {
      color: #3a6a8a;
      font-size: 12px;
      margin-bottom: 3px;
    }

    .mbti-bar {
      height: 7px;
      background: #0a1a28;
      border: 1px solid #1e3050;
      position: relative;
      margin-bottom: 2px;
    }

    .mbti-fa {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: #c88020;
    }

    .mbti-fb {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      background: #2060a0;
    }

    .mbti-vals {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .mbti-va {
      color: #c88020;
      font-weight: 700;
    }

    .mbti-vb {
      color: #2060a0;
      font-weight: 700;
    }

    .result-pers {
      background: #0a1a0c;
      border: 1px solid #1a4020;
      padding: 8px 10px;
      margin-bottom: 9px;
    }

    .result-pers-title {
      color: #4ac870;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-pers-txt {
      color: #90c890;
      font-size: 12px;
      line-height: 1.6;
    }

    .result-btn {
      width: 100%;
      background: var(--red);
      color: var(--gold);
      border: 2px solid var(--gold);
      padding: 13px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 2px;
      transition: all 0.12s;
      margin-bottom: 6px;
    }

    .result-btn:hover {
      background: #c02010;
    }

    .result-btn.sec {
      background: #0a1520;
      color: #5a8aaa;
      border-color: #1e3050;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* ?? GAME ?? */
    #gameScreen {
      background: var(--paper);
      border: 3px solid var(--border);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .game-top {
      background: var(--red);
      padding: 4px 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--ink);
    }

    .game-title {
      color: var(--gold);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .game-coin {
      background: var(--gold);
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      padding: 3px 9px;
      border: 2px solid var(--ink);
    }

    .evo-bar {
      background: var(--ink);
      padding: 2px 9px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .evo-stages {
      display: flex;
      gap: 2px;
      flex: 1;
    }

    .evo-s {
      flex: 1;
      height: 15px;
      border: 1px solid #3a1800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      transition: all 0.3s;
    }

    .evo-s.done {
      background: var(--gold);
      color: var(--ink);
      border-color: #f0b020;
    }

    .evo-s.cur {
      background: var(--red);
      color: #f0c870;
      border-color: #f0b020;
      animation: epulse 1.5s ease-in-out infinite;
    }

    .evo-s.lock {
      background: #2a1a0a;
      color: #5a3a1a;
      border-color: #3a2a0a;
    }

    @keyframes epulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.7
      }
    }

    .evo-xp {
      color: #f0c870;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ?? ?ㅽ꺈 ?⑤꼸 (媛쒖꽑) ?? */
    .stat-grid {
      background: #1a1208;
      padding: 8px 10px;
      border-bottom: 2px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px 8px;
    }

    .stat-it {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 5px 7px;
    }

    .stat-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-lbl {
      font-size: 11px;
      color: #c8a878;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .stat-num {
      font-size: 12px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.3px;
      min-width: 28px;
      text-align: right;
    }

    .stat-bg {
      background: rgba(0,0,0,0.4);
      height: 7px;
      border-radius: 10px;
      overflow: hidden;
    }

    .stat-f {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* ?꾪뿕 ??源쒕묀??*/
    .stat-it.danger .stat-num { color: #ff6040; animation: stat-blink 0.8s ease-in-out infinite; }
    .stat-it.warning .stat-num { color: #f0b040; }
    @keyframes stat-blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .s-hu { background: linear-gradient(90deg, #d02010, #ff4030); }
    .s-ha { background: linear-gradient(90deg, #c87010, #f0a030); }
    .s-he { background: linear-gradient(90deg, #1a7038, #30c060); }
    .s-mg { background: linear-gradient(90deg, #6030b0, #a060f0); }
    .s-fm { background: linear-gradient(90deg, #b03070, #e060b0); }
    .s-ed { background: linear-gradient(90deg, #1050a0, #2090e0); }

    .scene-wrap {
      position: relative;
      overflow: hidden;
      border-bottom: 2px solid var(--border);
    }

    #sceneCv {
      display: block;
      width: 100%;
      image-rendering: pixelated;
      cursor: pointer;
    }

    .scene-nametag {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border: 2px solid var(--ink);
      white-space: nowrap;
      pointer-events: none;
      z-index: 5;
    }

    .scene-agetag {
      position: absolute;
      top: 7px;
      left: 8px;
      background: var(--jade);
      color: white;
      font-size: 12px;
      padding: 2px 7px;
      border: 1px solid var(--ink);
      pointer-events: none;
      z-index: 5;
    }

    .scene-notif {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--red);
      color: var(--gold);
      padding: 6px 13px;
      border: 3px solid var(--ink);
      font-size: 12px;
      font-weight: 700;
      z-index: 20;
      white-space: nowrap;
      box-shadow: 3px 3px 0 var(--ink);
      display: none;
      pointer-events: none;
    }

    .scene-notif.on {
      display: block;
      animation: nfx 0.22s ease;
    }

    @keyframes nfx {
      from {
        opacity: 0;
        top: 44%
      }

      to {
        opacity: 1;
        top: 50%
      }
    }

    .tab-row {
      display: flex;
      border-bottom: 2px solid var(--border);
      background: #e0c890;
    }

    .tab {
      flex: 1;
      padding: 5px 3px;
      font-size: 11px;
      font-weight: 700;
      color: var(--border);
      cursor: pointer;
      text-align: center;
      border: none;
      background: none;
      font-family: inherit;
      transition: all 0.1s;
      border-right: 1px solid var(--border);
    }

    .tab:last-child {
      border-right: none;
    }

    .tab.act {
      background: var(--red);
      color: var(--gold);
    }

    .tab-content {
      display: none;
    }

    .tab-content.on {
      display: block;
    }

    /* ?? ?됰룞 踰꾪듉 洹몃━???? */
    .acts {
      padding: 10px 10px 4px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .acts + .acts { padding-top: 0; }

    /* 蹂듦퀬??移대뱶??踰꾪듉 */
    .ab {
      position: relative;
      background: linear-gradient(160deg, #fdf4e0 0%, #efe0b8 100%);
      border: none;
      border-radius: 10px;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      text-align: center;

    function schedMusic() {
      if (!audioOn) return;
      var S = SONGS[curSong], ahead = AC.currentTime + 0.22;
      while (seqNextT < ahead) {
        var S2 = SONGS[curSong];

        if (gn[0]) pluckNote(gn[0], gdur * 0.88, seqNextT, 0.50 + Math.random() * 0.12);

        var hp = seqPos[1] % S2.haeg.length, hn = S2.haeg[hp], hdur = hn[1] * sBD();
        if (hn[0]) bowNote(hn[0], hdur * 0.84, seqNextT + sBD() * 0.08, 0.26 + Math.random() * 0.08);
        seqPos[1] = (hp + 1) % S2.haeg.length;
        var fp = seqPos[2] % S2.flu.length, fn = S2.flu[fp], fdur = fn[1] * sBD();
        if (fn[0]) fluteNote(fn[0], fdur * 0.88, seqNextT + sBD() * 0.18, 0.20 + Math.random() * 0.07);
        seqPos[2] = (fp + 1) % S2.flu.length;
        seqNextT += gdur;
      }

    }
    function schedBeats() {
      if (!audioOn) return;

      var dp = seqPos[3] % S2.drn.length, dn = S2.drn[dp], ddur = dn[1] * sBD();

    function saveForInstagram() {
      playSFX('click');
      showNotif('?대?吏 ?앹꽦 以?..');

      var canvas = document.createElement('canvas');
      canvas.width = 1080; canvas.height = 1920;
      var ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;

      // 諛곌꼍
      var grad = ctx.createLinearGradient(0, 0, 0, 1920);
      grad.addColorStop(0, '#07080e'); grad.addColorStop(1, '#1a1008');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1920);

      // ?μ떇 ?⑦꽩 (諛섑닾紐?寃⑹옄)
      ctx.globalAlpha = 0.05;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      for (var i = 0; i < 1080; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1920); ctx.stroke(); }
      for (var j = 0; j < 1920; j += 40) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(1080, j); ctx.stroke(); }
      ctx.globalAlpha = 1;

      // 湲덉깋 ?뚮몢由?      ctx.strokeStyle = '#c8900a'; ctx.lineWidth = 15;
      ctx.strokeRect(30, 30, 1020, 1860);
      ctx.strokeStyle = '#f0d060'; ctx.lineWidth = 4;
      ctx.strokeRect(50, 50, 980, 1820);

      // ??댄?
      ctx.fillStyle = '#f8d060';
      ctx.font = '900 90px Noto Sans KR'; ctx.textAlign = 'center';
      ctx.fillText('議곗꽑 ?붽눼 ?꾩깮湲?, 540, 220);
      ctx.font = '700 45px Noto Sans KR'; ctx.fillStyle = '#b09050';
      ctx.fillText('?섏쓽 ?꾩깮 ?붽눼??臾댁뾿?멸??', 540, 300);

      var yk = window._resultYk;
      var mbti = calcMBTI();

      // 以묒븰 諛곗튂 諛?????ㅼ???(Stage 6 ?쒓컖 ?④낵 ?ы븿)
      ctx.save();
      ctx.translate(540, 750); // ?꾩튂 議곗젙
      ctx.scale(5, 5); // 5諛??뺣?
      drawYokai(ctx, yk, 6, 0, -32, -32, null);
      ctx.restore();

      // ?붽눼 ?뺣낫 諛뺤뒪
      ctx.fillStyle = 'rgba(158, 28, 12, 0.8)';
      ctx.fillRect(140, 1150, 800, 180);
      ctx.strokeStyle = '#f8d060'; ctx.lineWidth = 5;
      ctx.strokeRect(140, 1150, 800, 180);

      ctx.fillStyle = '#fff';
      ctx.font = '900 100px Noto Sans KR';
      ctx.fillText(yk.name, 540, 1260);
      ctx.fillStyle = '#fee500';
      ctx.font = '700 60px Noto Sans KR';
      ctx.fillText(mbti, 540, 1315);

      // ?곸꽭 ?ㅻ챸 (?꾨????댁꽍)
      ctx.fillStyle = '#d8e0e8';
      ctx.font = '500 38px Noto Sans KR';
      var txt = MD[mbti].m;
      var words = txt.split(' ');
      var line = '', lines = [], yPos = 1450;
      words.forEach(function (w) {
        var test = line + w + ' ';
        if (ctx.measureText(test).width > 800) { lines.push(line); line = w + ' '; }
        else { line = test; }
      });
      lines.push(line);
      lines.slice(0, 4).forEach(function (l) {
        ctx.fillText(l, 540, yPos);
        yPos += 55;
      });

      // ?섎떒 諭껋?
      ctx.fillStyle = '#7a9060';
      ctx.font = '700 32px Noto Sans KR';
      ctx.fillText('?뱀떊留뚯쓽 議곗꽑 ?붽눼瑜?李얠븘蹂댁꽭??, 540, 1780);
      ctx.fillStyle = '#fff';
      ctx.fillText(window.location.hostname || 'chosun-yokai.web.app', 540, 1830);

      // ?ㅼ슫濡쒕뱶

    }
